<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>المُقاوٍل | دخول الإدارة</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="admin-login-body">

  <!-- el background effects -->
  <div class="admin-login-bg">
    <div class="admin-login-grid"></div>
    <div class="admin-login-glow"></div>
  </div>

  <!-- el card el wa7ed fel nos -->
  <div class="admin-login-wrap auth-animate-in">
    <div class="admin-login-card">

      <!-- el shield icon fo2 -->
      <div class="admin-login-shield">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>

      <div class="admin-login-header">
        <span class="admin-login-tag">منطقة محظورة</span>
        <h1>لوحة تحكم الإدارة</h1>
        <p>الدخول مخصص للإدارة المعتمدة فقط. كل محاولة دخول مسجّلة.</p>
      </div>

      <!-- alert -->
      <div class="auth-alert" id="adminLoginAlert" role="alert"></div>

      <!-- el form -->
      <form class="auth-form admin-login-form" id="adminLoginForm" novalidate>

        <div class="auth-field">
          <label class="auth-label" for="adminEmail">البريد الإلكتروني</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input class="input" type="email" id="adminEmail" placeholder="admin@moquwal.com" required autocomplete="email">
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="adminPass">كلمة المرور</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input class="input" type="password" id="adminPass" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="auth-pass-toggle" data-target="adminPass" aria-label="إظهار كلمة المرور">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg auth-submit" id="adminLoginBtn">
          <span class="btn-label">دخول آمن</span>
          <span class="auth-btn-dots" hidden><span></span><span></span><span></span></span>
        </button>

      </form>

      <div class="admin-login-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <span>اتصال آمن ومشفر — TLS 1.3</span>
      </div>

    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
</body>
</html>
