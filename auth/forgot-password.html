<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استعادة كلمة المرور | المقاول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <style>
    /* ---- Page layout ---- */
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: linear-gradient(150deg, var(--color-navy-dark) 0%, var(--color-navy) 55%, #1a2d50 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      position: relative;
      overflow: hidden;
    }

    /* Background orbs */
    .bg-orb-1 {
      position: fixed;
      width: 500px; height: 500px;
      top: -120px; right: -80px;
      background: rgba(245,158,11,0.06);
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .bg-orb-2 {
      position: fixed;
      width: 350px; height: 350px;
      bottom: -60px; left: 20%;
      background: rgba(59,130,246,0.04);
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
    }

    /* Card */
    .auth-card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: var(--space-10) var(--space-8);
      width: 100%;
      max-width: 460px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    /* Logo */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }
    .auth-logo-mark {
      width: 42px; height: 42px;
      background: var(--color-gold);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-mark svg { width: 22px; height: 22px; fill: var(--color-navy-dark); }
    .auth-logo-text {
      font-size: 22px;
      font-weight: 900;
      color: var(--text-on-dark);
    }

    /* Header */
    .auth-header { margin-bottom: var(--space-8); }
    .auth-icon-wrap {
      width: 60px; height: 60px;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: var(--space-5);
    }
    .auth-icon-wrap svg { width: 28px; height: 28px; fill: var(--color-gold); }
    .auth-title {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-on-dark);
      margin-bottom: var(--space-2);
    }
    .auth-subtitle {
      font-size: var(--font-size-sm);
      color: var(--text-on-dark-muted);
      line-height: 1.75;
    }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: var(--space-5); }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-on-dark-muted);
      margin-bottom: var(--space-2);
    }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: 15px;
      color: var(--text-on-dark);
      transition: all var(--transition-base);
      box-sizing: border-box;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.25); }
    .form-control:focus {
      outline: none;
      border-color: var(--color-gold);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--color-gold);
      color: var(--color-navy-dark);
      font-family: var(--font-main);
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--color-gold-dark);
      box-shadow: var(--shadow-gold);
      transform: translateY(-2px);
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Alert */
    .alert {
      display: none;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
    }
    .alert.success {
      display: block;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }
    .alert.error {
      display: block;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    /* Back link */
    .auth-back {
      text-align: center;
      margin-top: var(--space-6);
    }
    .auth-back a {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-on-dark-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition-base);
    }
    .auth-back a:hover { color: var(--color-gold); }

    /* Success state */
    .success-state { text-align: center; display: none; }
    .success-icon {
      width: 72px; height: 72px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-5);
    }
    .success-icon svg { width: 34px; height: 34px; fill: var(--color-success); }
    .success-title { font-size: 22px; font-weight: 900; color: var(--text-on-dark); margin-bottom: var(--space-3); }
    .success-msg { font-size: var(--font-size-sm); color: var(--text-on-dark-muted); line-height: 1.75; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(15,23,42,0.3);
      border-top-color: var(--color-navy-dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-orb-1"></div>
  <div class="bg-orb-2"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <span class="auth-logo-text">المقاول</span>
    </div>

    <!-- Form state -->
    <div id="formState">
      <div class="auth-header">
        <div class="auth-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <h1 class="auth-title">استعادة كلمة المرور</h1>
        <p class="auth-subtitle">
          أدخل بريدك الإلكتروني المسجل وسنرسل لك رابط إعادة تعيين كلمة المرور
        </p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form class="auth-form" id="forgotForm">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="example@email.com"
            required
            autocomplete="email"
          />
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          إرسال رابط الاستعادة
        </button>
      </form>
    </div>

    <!-- Success state -->
    <div id="successState" class="success-state">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <p class="success-title">تم إرسال الرابط!</p>
      <p class="success-msg">
        راجع بريدك الإلكتروني. لو ما لقيتهاش في الـ inbox، فتش في مجلد الـ Spam.
        <br><br>
        الرابط صالح لمدة ساعة واحدة فقط.
      </p>
      <div style="margin-top: var(--space-6)">
        <a href="login.html" class="btn-submit" style="text-decoration:none; display:inline-flex; width:auto; padding: 12px 28px;">
          العودة لتسجيل الدخول
        </a>
      </div>
    </div>

    <!-- Back link -->
    <div class="auth-back">
      <a href="login.html">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        العودة لتسجيل الدخول
      </a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:4000/api'
      : '/api';

    const forgotForm = document.getElementById('forgotForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const formState = document.getElementById('formState');
    const successState = document.getElementById('successState');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = `alert ${type}`;
    }

    function clearAlert() {
      alertBox.className = 'alert';
    }

    function setLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div> جاري الإرسال...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          إرسال رابط الاستعادة`;
      }
    }

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const email = document.getElementById('email').value.trim();
      if (!email) {
        showAlert('برجاء إدخال البريد الإلكتروني', 'error');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
          credentials: 'include',
        });

        const data = await res.json();

        if (res.ok) {
          // Always show success (security — don't reveal if email exists)
          formState.style.display = 'none';
          successState.style.display = 'block';
        } else {
          showAlert(data.message || 'حدث خطأ. حاول مرة أخرى.', 'error');
        }
      } catch (err) {
        showAlert('تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.', 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
