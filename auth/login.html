<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المُقاوٍل | تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

  <div class="auth-layout">

    <!-- ===== LEFT: Decorative Brand Side ===== -->
    <div class="auth-brand-side">
      <div class="auth-brand-content">
        <div class="auth-brand-icon">❝</div>
        <h1 class="auth-brand-title">المقاول</h1>
        <p class="auth-brand-tagline">
          منصتك الذكية للربط بين أصحاب العقارات<br>والمحترفين في مجال البناء والتشطيب
        </p>
        <div class="auth-floating-quotes">
          <div class="auth-float-q">"ابني حلمك مع أفضل المحترفين"</div>
          <div class="auth-float-q">"عروض أسعار تنافسية في مكان واحد"</div>
          <div class="auth-float-q">"متابعة مشروعك خطوة بخطوة"</div>
        </div>
      </div>
    </div>

    <!-- ===== RIGHT: Login Form ===== -->
    <div class="auth-form-side">
      <div class="auth-form-box auth-animate-in">

        <!-- mobile logo — byban bs lama el side ye5tfy -->
        <div class="auth-mobile-logo">
          <div class="auth-mobile-logo-icon">❝</div>
          <span>المُقوَّل</span>
        </div>

        <!-- form header -->
        <div class="auth-form-header">
          <h2>أهلاً بعودتك 👋</h2>
          <p>سجّل دخولك وتابع مشاريعك</p>
        </div>

        <!-- alert box lel errors -->
        <div class="auth-alert" id="loginAlert" role="alert"></div>

        <!-- el form -->
        <form class="auth-form" id="loginForm" novalidate>

          <!-- el identifier — NID ONLY per user request -->
          <div class="auth-field">
            <label class="auth-label" for="loginIdentifier">الرقم القومي</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <path d="M2 10h20M6 15h4"/>
              </svg>
              <input class="input" type="text" id="loginIdentifier" placeholder="14 رقم" pattern="\d{14}" maxlength="14" inputmode="numeric" required autocomplete="username">
            </div>
          </div>

          <!-- password -->
          <div class="auth-field">
            <div class="auth-label-row">
              <label class="auth-label" for="loginPass">كلمة المرور</label>
              <a href="#" class="auth-forgot-link">نسيتها؟</a>
            </div>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input class="input" type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="auth-pass-toggle" data-target="loginPass" aria-label="إظهار كلمة المرور">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- remember me -->
          <div class="auth-check-row">
            <label class="checkbox-wrap">
              <input type="checkbox" id="rememberMe">
              <span>تذكّرني</span>
            </label>
          </div>

          <!-- submit -->
          <button type="submit" class="btn btn-primary btn-full btn-lg auth-submit" id="loginBtn">
            <span class="btn-label">تسجيل الدخول</span>
            <span class="auth-btn-dots" hidden><span></span><span></span><span></span></span>
          </button>

          <!-- divider -->
          <div class="divider">أو</div>

          <!-- google -->
          <button type="button" class="auth-social-btn">
            <svg viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>الدخول بحساب Google</span>
          </button>

        </form>

        <!-- footer link -->
        <p class="auth-footer-text">
          ليس لديك حساب؟
          <a href="role-select.html">أنشئ حسابًا جديدًا</a>
        </p>

      </div>
    </div>

  </div>

  <script src="../assets/js/auth.js"></script>
</body>
</html>
