<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المُقاوٍل | إنشاء حساب</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

  <div class="auth-layout">

    <!-- ===== LEFT: Decorative Brand Side ===== -->
    <div class="auth-brand-side">
      <div class="auth-brand-content">
        <div class="auth-brand-icon">❝</div>
        <h1 class="auth-brand-title">المقاول</h1>
        <p class="auth-brand-tagline">
          انضم لمجتمع البناء الذكي<br>وابدأ مشروعك اليوم
        </p>
        <div class="auth-floating-quotes">
          <div class="auth-float-q">"أكثر من 500 محترف موثوق"</div>
          <div class="auth-float-q">"تقييمات حقيقية من عملاء سابقين"</div>
          <div class="auth-float-q">"نظام دفع آمن ومرن"</div>
        </div>
      </div>
    </div>

    <!-- ===== RIGHT: Register Form ===== -->
    <div class="auth-form-side">
      <div class="auth-form-box auth-animate-in">

        <!-- mobile logo -->
        <div class="auth-mobile-logo">
          <div class="auth-mobile-logo-icon">❝</div>
          <span>المُقوَّل</span>
        </div>

        <!-- form header -->
        <div class="auth-form-header">
          <h2>أنشئ حسابك ✨</h2>
          <p>خطوة واحدة وتبدأ رحلتك معانا</p>
        </div>

        <!-- el role badge -->
        <div class="auth-role-badge">
          <span class="badge badge-gold" id="roleBadgeText">صاحب عقار</span>
          <a href="role-select.html" class="auth-forgot-link">تغيير</a>
        </div>

        <!-- alert -->
        <div class="auth-alert" id="registerAlert" role="alert"></div>

        <!-- el form -->
        <form class="auth-form" id="registerForm" novalidate>

          <!-- full name -->
          <div class="auth-field">
            <label class="auth-label" for="regName">الاسم الكامل</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="input" type="text" id="regName" placeholder="محمد أحمد" required autocomplete="name">
            </div>
          </div>

          <!-- email -->
          <div class="auth-field">
            <label class="auth-label" for="regEmail">البريد الإلكتروني</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input class="input" type="email" id="regEmail" placeholder="example@mail.com" required autocomplete="email">
            </div>
          </div>

          <!-- phone -->
          <div class="auth-field">
            <label class="auth-label" for="regPhone">رقم الهاتف</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
              </svg>
              <input class="input" type="tel" id="regPhone" placeholder="01xxxxxxxxx" required autocomplete="tel" dir="ltr" style="text-align:left;">
            </div>
          </div>

          <!-- password -->
          <div class="auth-field">
            <label class="auth-label" for="regPass">كلمة المرور</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input class="input" type="password" id="regPass" placeholder="8 حروف على الأقل" required autocomplete="new-password">
              <button type="button" class="auth-pass-toggle" data-target="regPass" aria-label="إظهار كلمة المرور">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="auth-strength-bar"><div class="auth-strength-fill" id="strengthFill"></div></div>
            <span class="auth-strength-label" id="strengthLabel"></span>
          </div>

          <!-- confirm password -->
          <div class="auth-field">
            <label class="auth-label" for="regPassConfirm">تأكيد كلمة المرور</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <input class="input" type="password" id="regPassConfirm" placeholder="أعد كتابة كلمة المرور" required autocomplete="new-password">
              <button type="button" class="auth-pass-toggle" data-target="regPassConfirm" aria-label="إظهار كلمة المرور">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- terms -->
          <div class="auth-check-row">
            <label class="checkbox-wrap">
              <input type="checkbox" id="agreeTerms" required>
              <span>أوافق على <a href="#" style="color:var(--color-gold-dark);font-weight:700;">الشروط والأحكام</a></span>
            </label>
          </div>

          <!-- submit -->
          <button type="submit" class="btn btn-primary btn-full btn-lg auth-submit" id="registerBtn">
            <span class="btn-label">إنشاء الحساب</span>
            <span class="auth-btn-dots" hidden><span></span><span></span><span></span></span>
          </button>

          <!-- divider -->
          <div class="divider">أو</div>

          <!-- google -->
          <button type="button" class="auth-social-btn">
            <svg viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>الدخول بحساب Google</span>
          </button>

        </form>

        <!-- footer link -->
        <p class="auth-footer-text">
          عندك حساب بالفعل؟
          <a href="login.html">سجل دخولك</a>
        </p>

      </div>
    </div>

  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    // register.html is a legacy landing register page — redirect to the
    // proper role-select flow when the user submits (keeps it functional
    // without a dedicated backend handler for this form id).
    (function () {
      var form = document.getElementById('registerForm');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        window.location.href = 'role-select.html';
      });
    })();
  </script>
</body>
</html>
