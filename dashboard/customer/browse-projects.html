<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استكشاف المشاريع | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <style>
    .browse-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: var(--space-6);
      align-items: start;
    }
    .filters {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 20px;
    }
    .filters h3 {
      font-size: var(--font-size-md); font-weight: 800; color: var(--color-navy); margin-bottom: var(--space-5); display: flex; align-items: center; gap: 10px;
    }
    .filters h3::after { content: ''; flex: 1; height: 1px; background: var(--border-default); }
    .filter-group { margin-bottom: var(--space-5); }
    .filter-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: var(--space-2); text-transform: uppercase; }
    .filter-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border-default); border-radius: var(--radius-sm); background: var(--bg-surface-2); font-family: var(--font-main); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr));
      gap: var(--space-5);
    }
    .project-card {
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      transition: all var(--transition-base);
      box-shadow: var(--shadow-sm);
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .project-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--color-gold-light); }
    
    .pc-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: (135deg, var(--color-navy), var(--color-navy-dark)); color: #fff; border-radius: var(--radius-full); font-size: 10px; font-weight: 800; background: var(--color-navy); }
    .pc-title { font-size: var(--font-size-md); font-weight: 800; color: var(--color-navy); line-height: 1.5; }
    .pc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); padding: var(--space-4) 0; border-top: 1px dashed var(--border-default); border-bottom: 1px dashed var(--border-default); }
    .pc-meta-item .lbl { font-size: 9px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
    .pc-meta-item .val { font-size: var(--font-size-sm); color: var(--color-navy); font-weight: 700; }
    
    .client-badge { font-size: 11px; color: var(--color-gold-dark); font-weight: 700; }
    
    @media (max-width: 1024px) { .browse-wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="dashboard-page">
  <div class="dashboard-wrapper">
    <aside class="sidebar" id="sidebarNode"></aside>
    <main class="dashboard-main">
      <div class="dashboard-topbar" id="topbarNode"></div>
      <div class="dashboard-content">
        <div class="page-head" style="margin-bottom: var(--space-8);">
          <h2 class="section-title">استكشاف المشاريع على المنصة</h2>
          <p style="color:var(--text-muted); font-size:var(--font-size-sm);">شاهد المشاريع النشطة في السوق المصري واستلهم الأفكار لمشروعك القادم.</p>
        </div>
        
        <div class="browse-wrap">
          <aside class="filters">
            <h3>تصفية المشاريع</h3>
            <div class="filter-group">
              <label>نوع المشروع</label>
              <select id="f-type">
                <option value="">كل الأنواع</option>
                <option value="new_construction">بناء جديد</option>
                <option value="renovation">تجديد</option>
                <option value="finishing">تشطيبات</option>
              </select>
            </div>
            <div class="filter-group">
              <label>المحافظة</label>
              <select id="f-gov">
                <option value="">كل المحافظات</option>
                <option>القاهرة</option><option>الجيزة</option>
              </select>
            </div>
            <button class="btn btn-outline btn-full" id="resetFilters">إعادة تعيين</button>
          </aside>
          
          <section class="projects-grid" id="projectsGrid">
            <!-- Injected -->
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/customer-router.js"></script>
  <script>
    const TYPE_LABELS = { new_construction:'بناء جديد', renovation:'تجديد', finishing:'تشطيبات', electrical:'كهرباء', plumbing:'سباكة', other:'أخرى' };
    const BUDGET_LABELS = { under_50k:'أقل من 50ألف', '50k_200k':'50-200ألف', '200k_500k':'200-500ألف', '500k_1m':'500ألف-1مليون', above_1m:'أكثر من 1مليون' };

    function injectLayout() {
      const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
      const initial = (user.name || 'م').charAt(0);
      document.getElementById('sidebarNode').innerHTML = `
        <div class="sidebar-header"><div class="sidebar-logo-text">المقاول</div></div>
        <div class="sidebar-user">
          <div class="sidebar-avatar">${initial}</div>
          <div class="sidebar-user-info"><div class="name">${user.name}</div><div class="role">عميل</div></div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-section-label">الرئيسية</div>
          <a href="index.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>لوحة التحكم</a>
          <a href="browse-projects.html" class="sidebar-item active"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>تصفح المشاريع</a>
          <div class="sidebar-section-label">مشاريعي</div>
          <a href="post-project.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>إضافة مشروع جديد</a>
          <a href="my-projects.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-4v-7h4v7z"/></svg>مشاريعي</a>
          <a href="proposals.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>عروض الأسعار</a>
          <a href="contract.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>اتفاقياتي</a>
        </nav>
      `;
      document.getElementById('topbarNode').innerHTML = `
        <div class="topbar-page-title">استكشاف المشاريع</div>
        <div class="topbar-actions"><div class="topbar-user"><div class="topbar-avatar">${initial}</div><div class="topbar-user-name">${user.name}</div></div></div>
      `;
    }

    async function loadProjects() {
      const grid = document.getElementById('projectsGrid');
      try {
        const data = await window.api.fetch('/projects');
        const projects = data.projects || [];
        if (projects.length === 0) {
          grid.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; padding:60px 20px; background:var(--bg-surface); border-radius:var(--radius-md); border:1px dashed var(--border-default);">
              <div style="font-size:48px; margin-bottom:16px;">📋</div>
              <h3 style="color:var(--color-navy); margin-bottom:8px; font-weight:800;">لا توجد مشاريع متاحة حالياً</h3>
              <p style="color:var(--text-muted); font-size:var(--font-size-sm);">عندما يتم نشر مشاريع جديدة ستظهر هنا</p>
            </div>`;
          return;
        }
        grid.innerHTML = projects.map(p => `
          <article class="project-card">
            <span class="pc-tag">${TYPE_LABELS[p.projectType] || 'مشروع'}</span>
            <h3 class="pc-title">${p.title}</h3>
            <div class="pc-meta">
              <div class="pc-meta-item"><span class="lbl">الموقع</span><div class="val">${p.propertyDetails?.governorate || '—'}</div></div>
              <div class="pc-meta-item"><span class="lbl">الميزانية</span><div class="val">${BUDGET_LABELS[p.budgetRange] || '—'}</div></div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
              <span class="client-badge">👤 صاحب المشروع: ${p.postedBy?.name || 'مستور'}</span>
              <span style="font-size:10px; color:var(--text-muted);">${new Date(p.createdAt).toLocaleDateString('ar-EG')}</span>
            </div>
          </article>
        `).join('');
      } catch(e) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;padding:40px;color:var(--text-muted);">خطأ في التحميل — حاول مرة أخرى</div>'; }
    }

    document.addEventListener('DOMContentLoaded', () => { injectLayout(); loadProjects(); });
  </script>
</body>
</html>
