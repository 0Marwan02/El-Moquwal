<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتفاقياتي | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <style>
    .contract-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
    }
    .contract-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .contract-status {
      position: absolute; top: var(--space-6); left: var(--space-6);
      padding: 4px 12px; border-radius: var(--radius-full);
      font-size: 11px; font-weight: 800; background: var(--color-success-bg); color: var(--color-success);
    }
    .contract-header {
      border-bottom: 1px dashed var(--border-default);
      padding-bottom: var(--space-4);
      margin-bottom: var(--space-2);
    }
    .contract-title { font-size: 18px; font-weight: 800; color: var(--color-navy); margin-bottom: 4px; }
    .contract-date { font-size: 11px; color: var(--text-muted); }

    .contract-parties {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-8);
    }
    .party-box {
      padding: var(--space-4); background: var(--bg-surface-2); border-radius: var(--radius-sm);
    }
    .party-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .party-name { font-size: var(--font-size-base); font-weight: 800; color: var(--color-navy); }
    .party-contact { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    .contract-details {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4);
      background: var(--color-navy-dark); color: #fff; padding: var(--space-4); border-radius: var(--radius-sm);
    }
    .det-item { text-align: center; }
    .det-lbl { font-size: 10px; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .det-val { font-size: var(--font-size-md); font-weight: 800; color: var(--color-gold); }

    .contract-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }

    @media (max-width: 600px) {
      .contract-parties { grid-template-columns: 1fr; }
      .contract-details { grid-template-columns: 1fr; gap: var(--space-3); }
    }
  </style>
</head>
<body class="dashboard-page">
  <div id="toastStack" style="position:fixed;top:18px;left:18px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebarNode"></aside>

    <!-- Main -->
    <main class="dashboard-main">
      <div class="dashboard-topbar" id="topbarNode"></div>

      <div class="dashboard-content">
        <div class="page-head" style="margin-bottom: var(--space-8);">
          <h2 class="section-title">اتفاقياتي الرقمية</h2>
          <p style="color:var(--text-muted); font-size:var(--font-size-sm);">هنا تجد جميع المشاريع التي تم الاتفاق عليها مع المقاولين.</p>
        </div>

        <div id="contractsContainer" class="contract-list">
          <!-- Injected by JS -->
          <div style="text-align:center; padding: 40px; color: var(--text-muted);">
            جاري تحميل الاتفاقيات...
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/customer-router.js"></script>
  <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:4000/api'
      : '/api';

    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.pointerEvents = 'auto';
      toast.style.minWidth = '260px';
      toast.style.maxWidth = '360px';
      toast.style.padding = '12px 14px';
      toast.style.borderRadius = '12px';
      toast.style.border = type === 'error' ? '1px solid rgba(239,68,68,0.35)' : '1px solid rgba(16,185,129,0.35)';
      toast.style.background = type === 'error' ? 'rgba(239,68,68,0.08)' : 'var(--color-success-bg)';
      toast.style.color = type === 'error' ? '#991b1b' : '#065f46';
      toast.style.boxShadow = 'var(--shadow-md)';
      toast.style.fontSize = 'var(--font-size-sm)';
      toast.style.fontWeight = '700';
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    // Component Injection (Sidebar/Topbar)
    function injectLayout() {
      const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
      const initial = (user.name || 'م').charAt(0);
      
      const sidebarHtml = `
        <div class="sidebar-header">
          <div class="sidebar-logo-mark"><img src="../../assets/images/logo.png" alt="المقاول"></div>
          <div class="sidebar-logo-text">المقاول</div>
        </div>
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">${initial}</div>
          <div class="sidebar-user-info">
            <div class="name">${user.name || '...'}</div>
            <div class="role">عميل</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-section-label">الرئيسية</div>
          <a href="index.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>لوحة التحكم</a>
          <div class="sidebar-section-label">المشاريع</div>
          <a href="post-project.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>إضافة مشروع جديد</a>
          <a href="my-projects.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-4v-7h4v7z"/></svg>مشاريعي</a>
          <a href="proposals.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>عروض الأسعار</a>
          <a href="contract.html" class="sidebar-item active"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>اتفاقياتي</a>
        </nav>
        <div class="sidebar-cta">
          <button class="btn btn-ghost-light btn-full" id="logoutBtn">تسجيل الخروج</button>
        </div>
      `;
      
      const topbarHtml = `
        <div class="topbar-page-title">اتفاقياتي</div>
        <div class="topbar-actions">
          <div class="topbar-user">
            <div class="topbar-avatar">${initial}</div>
            <div class="topbar-user-name">${user.name || '...'}</div>
          </div>
        </div>
      `;
      
      document.getElementById('sidebarNode').innerHTML = sidebarHtml;
      document.getElementById('topbarNode').innerHTML = topbarHtml;
      
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('elm_accessToken');
        localStorage.removeItem('elm_user');
        window.location.href = '../../index.html';
      });
    }

    async function loadContracts() {
      const container = document.getElementById('contractsContainer');
      const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
      
      try {
        const data = await window.api.fetch('/projects?status=awarded&limit=50');
        const awardedProjects = (data.projects || []).filter(p => 
          (p.postedBy._id || p.postedBy) === user._id
        );
        
        if (awardedProjects.length === 0) {
          container.innerHTML = `
            <div style="text-align:center; padding: 60px; background: var(--bg-surface); border-radius: var(--radius-md); border: 1px dashed var(--border-default);">
              <div style="font-size: 48px; margin-bottom: 20px;">📄</div>
              <h3 style="color: var(--color-navy); margin-bottom: 10px;">لا توجد مشاريع مُرساة بعد</h3>
              <p style="color: var(--text-muted);">بمجرد قبول عرض سعر مشروع، يمكنك إنشاء وتوقيع العقد هنا.</p>
              <a href="proposals.html" class="btn btn-primary" style="margin-top:20px;">مراجعة عروض الأسعار</a>
            </div>
          `;
          return;
        }
        
        let html = '';
        for (const p of awardedProjects) {
          // Fetch contract for this project
          try {
            const token = localStorage.getItem('elm_accessToken') || localStorage.getItem('token');
            const res = await fetch(`${API_BASE}/contracts/project/${p._id}`, {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            const cData = await res.json();
            
            if (!res.ok) {
              // Not generated yet
              html += `
                <div class="contract-card">
                  <span class="contract-status" style="background:#fef3c7; color:#d97706;">في انتظار توليد العقد ⏳</span>
                  <div class="contract-header">
                    <h3 class="contract-title">${p.title}</h3>
                    <div class="contract-date">رقم المشروع: #${p._id.slice(-6).toUpperCase()}</div>
                  </div>
                  <button onclick="generateContract('${p._id}')" class="btn btn-primary">توليد العقد الإلكتروني</button>
                </div>
              `;
              continue;
            }

            const contract = cData.contract;
            const customerSigned = contract.customerSignature?.signed;
            const isFullySigned = contract.status === 'active';

            html += `
              <div class="contract-card">
                <span class="contract-status" style="${isFullySigned ? 'background:var(--color-success-bg); color:var(--color-success);' : 'background:#dbeafe; color:#1d4ed8;'}">
                  ${isFullySigned ? 'اتفاق مفعل ✅' : 'في انتظار التوقيع ✍️'}
                </span>
                <div class="contract-header">
                  <h3 class="contract-title">${contract.projectTitle}</h3>
                  <div class="contract-date">رقم العقد: #${contract._id.slice(-6).toUpperCase()}</div>
                </div>
                
                <div class="contract-parties">
                  <div class="party-box">
                    <span class="party-label">الطرف الأول (العميل)</span>
                    <div class="party-name">${contract.customer?.name || user.name}</div>
                    <div class="party-contact" style="${customerSigned ? 'color:#10b981; font-weight:bold;' : 'color:#f59e0b;'}">${customerSigned ? 'وقع ✅' : 'لم يوقع بعد'}</div>
                  </div>
                  <div class="party-box">
                    <span class="party-label">الطرف الثاني (المقاول)</span>
                    <div class="party-name">${contract.contractor?.name || 'مقاول'}</div>
                    <div class="party-contact" style="${contract.contractorSignature?.signed ? 'color:#10b981; font-weight:bold;' : 'color:#f59e0b;'}">${contract.contractorSignature?.signed ? 'وقع ✅' : 'لم يوقع بعد'}</div>
                  </div>
                </div>
                
                <div class="contract-details">
                  <div class="det-item">
                    <div class="det-lbl">قيمة التعاقد</div>
                    <div class="det-val">${(contract.bidAmount || 0).toLocaleString('ar-EG')} ج.م</div>
                  </div>
                  <div class="det-item">
                    <div class="det-lbl">المدة المتوقعة</div>
                    <div class="det-val">${contract.proposedDuration || '—'} يوم</div>
                  </div>
                  <div class="det-item">
                    <div class="det-lbl">سقف الضمان</div>
                    <div class="det-val">${(contract.warrantyCapEGP || 0).toLocaleString()} ج.م</div>
                  </div>
                </div>
                
                <div class="contract-actions" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                  <button class="btn btn-outline btn-sm" onclick="window.open(\`${API_BASE}/contracts/${contract._id}/pdf?token=${token}\`, '_blank')">تحميل العقد PDF 📄</button>
                  ${!customerSigned ? `<button class="btn btn-primary btn-sm" onclick="signContract('${contract._id}')">توقيع إلكتروني ✍️</button>` : ''}
                  ${isFullySigned ? `<a href="escrow.html?projectId=${p._id}" class="btn btn-sm" style="background:#10b981; color:white; border:none; border-radius:var(--radius-sm); font-weight:bold; padding:7px 14px;">نظام الضمان Escrow 🛡️</a>` : ''}
                </div>
              </div>
            `;
          } catch(e) { console.error(e); }
        }
        
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error-msg">خطأ في تحميل الاتفاقيات: ${err.message}</div>`;
      }
    }

    window.generateContract = async function(projectId) {
      showToast('جاري توليد العقد...', 'success');
      const token = localStorage.getItem('elm_accessToken') || localStorage.getItem('token');
      try {
        const res = await fetch(`${API_BASE}/contracts/generate`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ projectId })
        });
        if(res.ok) {
          showToast('تم توليد العقد بنجاح!', 'success');
          loadContracts();
        } else {
          const data = await res.json();
          showToast(data.message || 'فشل التوليد', 'error');
        }
      } catch(e) { showToast('خطأ بالاتصال', 'error'); }
    };

    // ── E-Signature Modal Logic ──
    let _signContractId = null;
    let _signMode = 'draw';
    let _isDrawing = false;
    let _ctx = null;

    window.signContract = function(contractId) {
      _signContractId = contractId;
      const modal = document.getElementById('signModal');
      modal.style.display = 'flex';
      switchSignTab('draw');
      initCanvas();
    };

    window.closeSignModal = function() {
      document.getElementById('signModal').style.display = 'none';
      _signContractId = null;
    };

    window.switchSignTab = function(mode) {
      _signMode = mode;
      document.getElementById('drawSection').style.display = mode === 'draw' ? 'block' : 'none';
      document.getElementById('uploadSection').style.display = mode === 'upload' ? 'block' : 'none';
      document.getElementById('tabDraw').className = mode === 'draw' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
      document.getElementById('tabUpload').className = mode === 'upload' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
      if (mode === 'draw') initCanvas();
    };

    function initCanvas() {
      const canvas = document.getElementById('signCanvas');
      if (!canvas) return;
      _ctx = canvas.getContext('2d');
      _ctx.lineWidth = 2.5;
      _ctx.lineCap = 'round';
      _ctx.strokeStyle = '#0F172A';

      canvas.onmousedown = (e) => { _isDrawing = true; _ctx.beginPath(); _ctx.moveTo(e.offsetX, e.offsetY); };
      canvas.onmousemove = (e) => { if (!_isDrawing) return; _ctx.lineTo(e.offsetX, e.offsetY); _ctx.stroke(); };
      canvas.onmouseup = () => { _isDrawing = false; };
      canvas.onmouseleave = () => { _isDrawing = false; };

      canvas.ontouchstart = (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        _isDrawing = true; _ctx.beginPath(); _ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top);
      };
      canvas.ontouchmove = (e) => {
        e.preventDefault();
        if (!_isDrawing) return;
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        _ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top); _ctx.stroke();
      };
      canvas.ontouchend = () => { _isDrawing = false; };
    }

    window.clearCanvas = function() {
      const canvas = document.getElementById('signCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    window.previewUploadedSig = function(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.getElementById('sigPreview');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    };

    window.submitSignature = async function() {
      if (!_signContractId) return;
      let signatureData = '';

      if (_signMode === 'draw') {
        const canvas = document.getElementById('signCanvas');
        signatureData = canvas.toDataURL('image/png');
        const blank = document.createElement('canvas');
        blank.width = canvas.width; blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) {
          alert('يرجى رسم توقيعك أولاً');
          return;
        }
      } else {
        const img = document.getElementById('sigPreview');
        if (!img.src || img.style.display === 'none') {
          alert('يرجى رفع صورة التوقيع أولاً');
          return;
        }
        signatureData = img.src;
      }

      const btn = document.getElementById('submitSignBtn');
      btn.disabled = true;
      btn.textContent = '⏳ جاري الإرسال...';

      try {
        const token = localStorage.getItem('elm_accessToken');
        const res = await fetch(`${API_BASE}/contracts/${_signContractId}/sign`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ signatureData })
        });

        if (res.ok) {
          showToast('تم توقيع العقد بنجاح! ✅', 'success');
          closeSignModal();
          loadContracts();
        } else {
          const data = await res.json().catch(() => ({}));
          showToast(data.message || 'تعذّر تسجيل التوقيع', 'error');
        }
      } catch (err) {
        showToast('خطأ بالاتصال', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✅ تأكيد التوقيع وإرسال';
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      injectLayout();
      loadContracts();
      
      // Inject Modal to body
      if (!document.getElementById('signModal')) {
        const modalHtml = `
          <div id="signModal" class="modal-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
            <div style="background:var(--bg-surface);border-radius:var(--radius-lg);padding:var(--space-8);max-width:520px;width:95%;box-shadow:var(--shadow-xl);position:relative;border:1px solid var(--border-default);">
              <button onclick="closeSignModal()" style="position:absolute;top:12px;left:12px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);">✕</button>
              <h3 style="font-size:var(--font-size-lg);font-weight:900;color:var(--color-navy);margin-bottom:var(--space-2);">التوقيع الإلكتروني</h3>
              <p style="font-size:var(--font-size-xs);color:var(--text-muted);margin-bottom:var(--space-6);">ارسم توقيعك بالماوس أو بإصبعك على الشاشة، أو ارفع صورة لتوقيعك.</p>

              <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-4);">
                <button id="tabDraw" onclick="switchSignTab('draw')" class="btn btn-primary btn-sm" style="flex:1;">✏️ رسم التوقيع</button>
                <button id="tabUpload" onclick="switchSignTab('upload')" class="btn btn-outline btn-sm" style="flex:1;">📷 رفع صورة</button>
              </div>

              <div id="drawSection">
                <canvas id="signCanvas" width="460" height="180" style="width:100%;border:2px dashed var(--border-default);border-radius:var(--radius-sm);background:#fafafa;cursor:crosshair;touch-action:none;"></canvas>
                <button onclick="clearCanvas()" style="margin-top:var(--space-2);background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:inherit;">🗑️ مسح التوقيع</button>
              </div>

              <div id="uploadSection" style="display:none;">
                <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8);border:2px dashed var(--border-default);border-radius:var(--radius-sm);cursor:pointer;background:#fafafa;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--color-gold)'" onmouseout="this.style.borderColor='var(--border-default)'">
                  <span style="font-size:36px;margin-bottom:var(--space-2);">📁</span>
                  <span style="font-size:var(--font-size-sm);color:var(--text-muted);">اضغط لاختيار صورة التوقيع</span>
                  <input type="file" id="signFileInput" accept="image/*" style="display:none;" onchange="previewUploadedSig(this)">
                </label>
                <img id="sigPreview" src="" alt="" style="display:none;max-width:100%;max-height:160px;margin-top:var(--space-3);border-radius:var(--radius-sm);border:1px solid var(--border-default);">
              </div>

              <button id="submitSignBtn" onclick="submitSignature()" class="btn btn-primary btn-full" style="margin-top:var(--space-5);font-size:var(--font-size-md);font-weight:800;">
                ✅ تأكيد التوقيع وإرسال
              </button>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
      }
    });
  </script>
</body>
</html>
