<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتفاقياتي | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <style>
    .contract-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
    }
    .contract-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .contract-status {
      position: absolute; top: var(--space-6); left: var(--space-6);
      padding: 4px 12px; border-radius: var(--radius-full);
      font-size: 11px; font-weight: 800; background: var(--color-success-bg); color: var(--color-success);
    }
    .contract-header {
      border-bottom: 1px dashed var(--border-default);
      padding-bottom: var(--space-4);
      margin-bottom: var(--space-2);
    }
    .contract-title { font-size: 18px; font-weight: 800; color: var(--color-navy); margin-bottom: 4px; }
    .contract-date { font-size: 11px; color: var(--text-muted); }

    .contract-parties {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-8);
    }
    .party-box {
      padding: var(--space-4); background: var(--bg-surface-2); border-radius: var(--radius-sm);
    }
    .party-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .party-name { font-size: var(--font-size-base); font-weight: 800; color: var(--color-navy); }
    .party-contact { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    .contract-details {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4);
      background: var(--color-navy-dark); color: #fff; padding: var(--space-4); border-radius: var(--radius-sm);
    }
    .det-item { text-align: center; }
    .det-lbl { font-size: 10px; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .det-val { font-size: var(--font-size-md); font-weight: 800; color: var(--color-gold); }

    .contract-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }

    @media (max-width: 600px) {
      .contract-parties { grid-template-columns: 1fr; }
      .contract-details { grid-template-columns: 1fr; gap: var(--space-3); }
    }
  </style>
</head>
<body class="dashboard-page">
  <div id="toastStack" style="position:fixed;top:18px;left:18px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebarNode"></aside>

    <!-- Main -->
    <main class="dashboard-main">
      <div class="dashboard-topbar" id="topbarNode"></div>

      <div class="dashboard-content">
        <div class="page-head" style="margin-bottom: var(--space-8);">
          <h2 class="section-title">اتفاقياتي الرقمية</h2>
          <p style="color:var(--text-muted); font-size:var(--font-size-sm);">هنا تجد جميع المشاريع التي تم الاتفاق عليها مع المقاولين.</p>
        </div>

        <div id="contractsContainer" class="contract-list">
          <!-- Injected by JS -->
          <div style="text-align:center; padding: 40px; color: var(--text-muted);">
            جاري تحميل الاتفاقيات...
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script>
    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.pointerEvents = 'auto';
      toast.style.minWidth = '260px';
      toast.style.maxWidth = '360px';
      toast.style.padding = '12px 14px';
      toast.style.borderRadius = '12px';
      toast.style.border = type === 'error' ? '1px solid rgba(239,68,68,0.35)' : '1px solid rgba(16,185,129,0.35)';
      toast.style.background = type === 'error' ? 'rgba(239,68,68,0.08)' : 'var(--color-success-bg)';
      toast.style.color = type === 'error' ? '#991b1b' : '#065f46';
      toast.style.boxShadow = 'var(--shadow-md)';
      toast.style.fontSize = 'var(--font-size-sm)';
      toast.style.fontWeight = '700';
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    // Component Injection (Sidebar/Topbar)
    function injectLayout() {
      const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
      const initial = (user.name || 'م').charAt(0);
      
      const sidebarHtml = `
        <div class="sidebar-header">
          <div class="sidebar-logo-mark"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg></div>
          <div class="sidebar-logo-text">المقاول</div>
        </div>
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">${initial}</div>
          <div class="sidebar-user-info">
            <div class="name">${user.name || '...'}</div>
            <div class="role">عميل</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-section-label">الرئيسية</div>
          <a href="index.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>لوحة التحكم</a>
          <div class="sidebar-section-label">المشاريع</div>
          <a href="post-project.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>إضافة مشروع جديد</a>
          <a href="proposals.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>عروض الأسعار</a>
          <a href="contract.html" class="sidebar-item active"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>اتفاقياتي</a>
        </nav>
        <div class="sidebar-cta">
          <button class="btn btn-ghost-light btn-full" id="logoutBtn">تسجيل الخروج</button>
        </div>
      `;
      
      const topbarHtml = `
        <div class="topbar-page-title">اتفاقياتي</div>
        <div class="topbar-actions">
          <div class="topbar-user">
            <div class="topbar-avatar">${initial}</div>
            <div class="topbar-user-name">${user.name || '...'}</div>
          </div>
        </div>
      `;
      
      document.getElementById('sidebarNode').innerHTML = sidebarHtml;
      document.getElementById('topbarNode').innerHTML = topbarHtml;
      
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('elm_accessToken');
        localStorage.removeItem('elm_user');
        window.location.href = '../../index.html';
      });
    }

    async function loadContracts() {
      const container = document.getElementById('contractsContainer');
      const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
      
      try {
        const data = await window.api.fetch('/projects');
        const awardedProjects = (data.projects || []).filter(p => 
          p.status === 'awarded' && (p.postedBy._id || p.postedBy) === user._id
        );
        
        if (awardedProjects.length === 0) {
          container.innerHTML = `
            <div style="text-align:center; padding: 60px; background: var(--bg-surface); border-radius: var(--radius-md); border: 1px dashed var(--border-default);">
              <div style="font-size: 48px; margin-bottom: 20px;">📄</div>
              <h3 style="color: var(--color-navy); margin-bottom: 10px;">لا توجد اتفاقيات مفعلة بعد</h3>
              <p style="color: var(--text-muted);">بمجرد قبول عرض سعر مشروع، ستظهر تفاصيل الاتفاق هنا.</p>
              <a href="proposals.html" class="btn btn-primary" style="margin-top:20px;">مراجعة عروض الأسعار</a>
            </div>
          `;
          return;
        }
        
        container.innerHTML = awardedProjects.map(p => `
          <div class="contract-card">
            <span class="contract-status">اتفاق مفعل ✅</span>
            <div class="contract-header">
              <h3 class="contract-title">${p.title}</h3>
              <div class="contract-date">رقم المشروع: #${p._id.slice(-6).toUpperCase()}</div>
            </div>
            
            <div class="contract-parties">
              <div class="party-box">
                <span class="party-label">الطرف الأول (العميل)</span>
                <div class="party-name">${user.name}</div>
                <div class="party-contact">${user.phone || '—'}</div>
              </div>
              <div class="party-box">
                <span class="party-label">الطرف الثاني (المقاول)</span>
                <div class="party-name">${p.acceptedBid?.professional?.name || 'مقاول معتمد'}</div>
                <div class="party-contact">${p.acceptedBid?.professional?.phone || 'تم الكشف عن بيانات التواصل'}</div>
              </div>
            </div>
            
            <div class="contract-details">
              <div class="det-item">
                <div class="det-lbl">قيمة التعاقد</div>
                <div class="det-val">${(p.acceptedBid?.amount || 0).toLocaleString('ar-EG')} ج.م</div>
              </div>
              <div class="det-item">
                <div class="det-lbl">نوع المشروع</div>
                <div class="det-val">${p.projectType === 'new_construction' ? 'بناء جديد' : 'تشطيب/تجديد'}</div>
              </div>
              <div class="det-item">
                <div class="det-lbl">الموقع</div>
                <div class="det-val">${p.propertyDetails?.governorate || '—'}</div>
              </div>
            </div>
            
            <div class="contract-actions">
              <button class="btn btn-outline btn-sm" onclick="showToast('جاري تجهيز نسخة PDF...', 'success')">تحميل العقد PDF</button>
              <button class="btn btn-primary btn-sm" onclick="showToast('ميزة المراسلة المباشرة ستتوفر قريباً', 'success')">مراسلة المقاول</button>
            </div>
          </div>
        `).join('');
        
      } catch (err) {
        container.innerHTML = `<div class="error-msg">خطأ في تحميل الاتفاقيات: ${err.message}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      injectLayout();
      loadContracts();
    });
  </script>
</body>
</html>
