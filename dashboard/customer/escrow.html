<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام الضمان | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <style>
    /* ====== Escrow Hero ====== */
    .escrow-hero {
      background: linear-gradient(135deg, var(--color-navy-dark) 0%, var(--color-navy) 100%);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-10);
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-6);
      position: relative; overflow: hidden; margin-bottom: var(--space-8);
    }
    .escrow-hero::before {
      content: '';
      position: absolute; top: -80px; left: -60px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(16,185,129,0.10) 0%, transparent 70%);
    }
    .escrow-hero-inner { position: relative; z-index: 1; }
    .escrow-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .escrow-value { font-size: 42px; font-weight: 900; color: var(--color-gold); line-height: 1; }
    .escrow-sub { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }
    .escrow-icon {
      width: 72px; height: 72px;
      background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      font-size: 32px; position: relative; z-index: 1;
    }

    /* ====== Milestones ====== */
    .milestones-card {
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .milestones-header {
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      font-size: var(--font-size-base); font-weight: 800; color: var(--color-navy);
      display: flex; align-items: center; gap: var(--space-3);
    }
    .milestone-row {
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      transition: background var(--transition-base);
    }
    .milestone-row:last-child { border-bottom: none; }
    .milestone-row:hover { background: var(--bg-surface-2); }
    .milestone-row.released { background: rgba(16,185,129,0.04); border-right: 3px solid var(--color-success); }
    .milestone-info { flex: 1; }
    .milestone-name { font-weight: 800; color: var(--color-navy); margin-bottom: 4px; }
    .milestone-pct { font-size: 12px; color: var(--text-muted); }
    .milestone-amount { font-size: 20px; font-weight: 900; color: var(--color-navy); margin: 0 var(--space-4); }
    .milestone-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 700;
    }
    .ms-released { background: var(--color-success-bg); color: var(--color-success); }
    .ms-pending  { background: var(--bg-surface-2); color: var(--text-muted); }

    /* ====== Deposit Card ====== */
    .deposit-card {
      background: var(--bg-surface); border: 2px dashed var(--border-strong);
      border-radius: var(--radius-md); padding: var(--space-10) var(--space-8);
      text-align: center; margin-bottom: var(--space-6);
    }
    .deposit-icon { font-size: 48px; margin-bottom: var(--space-4); }
    .deposit-title { font-size: 20px; font-weight: 800; color: var(--color-navy); margin-bottom: var(--space-3); }
    .deposit-desc { font-size: var(--font-size-sm); color: var(--text-muted); margin-bottom: var(--space-6); }

    /* Alert */
    .alert-box {
      display: none; padding: 14px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; text-align: center; margin-bottom: var(--space-5);
    }
    .alert-box.success { display: block; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); color: var(--color-success); }
    .alert-box.error   { display: block; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: var(--color-error); }
  </style>
</head>
<body class="dashboard-page">
<div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
<div class="dashboard-wrapper">

  <aside class="sidebar" id="sidebarNode"></aside>

  <main class="dashboard-main">
    <div class="dashboard-topbar" id="topbarNode"></div>

    <div class="dashboard-content">
      <div style="margin-bottom:var(--space-6); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <a href="contract.html" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--font-size-sm);font-weight:700;color:var(--text-muted);text-decoration:none;transition:color .2s;" onmouseover="this.style.color='var(--color-navy)'" onmouseout="this.style.color='var(--text-muted)'">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          العودة للاتفاقيات
        </a>
        <div id="contractDownloadContainer"></div>
      </div>

      <div class="alert-box" id="alertBox"></div>
      <div id="mainContent">
        <div style="text-align:center; padding:60px; color:var(--text-muted);">جاري تحميل بيانات الضمان...</div>
      </div>
    </div>
  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/customer-router.js"></script>
<script>
/* ============================================================
   escrow.js (inline)
   ============================================================ */
function showToast(message, type = 'success') {
  const stack = document.getElementById('toastStack');
  if (!stack) return;
  const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
  const t = ['success','error','info','warning'].includes(type) ? type : 'success';
  const toast = document.createElement('div');
  toast.className = `toast-item toast-${t}`;
  toast.innerHTML = `<span class="toast-icon">${icons[t]}</span><div class="toast-body"><div class="toast-msg">${message}</div></div><button class="toast-close" onclick="this.closest('.toast-item').remove()">×</button>`;
  stack.appendChild(toast);
  setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 4000);
}

const params = new URLSearchParams(location.search);
const projectId = params.get('projectId');

if (!localStorage.getItem('elm_user') || !localStorage.getItem('elm_accessToken')) {
  window.location.href = '../../auth/login.html';
}
if (!projectId) {
  showToast('لم يتم تحديد المشروع في الرابط', 'error');
}

function injectLayout() {
  const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
  const initial = (user.name || 'م').charAt(0);
  document.getElementById('sidebarNode').innerHTML = `
    <div class="sidebar-header">
      <div class="sidebar-logo-mark"><img src="../../assets/images/logo.png" alt="المقاول"></div>
      <div class="sidebar-logo-text">المقاول</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar">${initial}</div>
      <div class="sidebar-user-info"><div class="name">${user.name || '...'}</div><div class="role">عميل</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">الرئيسية</div>
      <a href="index.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>لوحة التحكم</a>
      <div class="sidebar-section-label">المشاريع</div>
      <a href="post-project.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>إضافة مشروع</a>
      <a href="my-projects.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-4v-7h4v7z"/></svg>مشاريعي</a>
      <a href="proposals.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>عروض الأسعار</a>
      <a href="contract.html" class="sidebar-item active"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>اتفاقياتي</a>
    </nav>
    <div class="sidebar-cta">
      <button class="btn btn-ghost-light btn-full" id="logoutBtn">تسجيل الخروج</button>
    </div>
  `;
  document.getElementById('topbarNode').innerHTML = `
    <div class="topbar-page-title">نظام الضمان (Escrow)</div>
    <div class="topbar-actions"><div class="topbar-user"><div class="topbar-avatar">${initial}</div><div class="topbar-user-name">${user.name || '...'}</div></div></div>
  `;
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await window.api.fetch('/auth/logout', { method: 'POST' }); } catch (_) {}
    localStorage.removeItem('elm_accessToken'); localStorage.removeItem('elm_user');
    window.location.href = '../../index.html';
  });
}

async function loadEscrow() {
  const container = document.getElementById('mainContent');
  try {
    const data = await window.api.fetch(`/billing/escrow/${projectId}`);
    const e = data.escrow;
    renderEscrow(e);
    loadContractPDFBtn();
  } catch (err) {
    if (err.message?.includes('404') || err.status === 404) {
      container.innerHTML = `
        <div class="deposit-card">
          <div class="deposit-icon">🛡️</div>
          <div class="deposit-title">لم يتم إيداع مبلغ الضمان بعد</div>
          <div class="deposit-desc">
            يُحفظ مبلغ الضمان في حساب منفصل آمن ويُصرف للمقاول على مراحل
            بعد تأكيدك إتمام كل مرحلة — حمايةً لكلا الطرفين.
          </div>
          <button class="btn btn-primary" onclick="deposit()">🔒 إيداع مبلغ الضمان الآن</button>
        </div>`;
    } else {
      container.innerHTML = `<div style="text-align:center; padding:60px; color:var(--color-error);">تعذر تحميل بيانات الضمان: ${err.message}</div>`;
    }
  }
}

async function loadContractPDFBtn() {
  const container = document.getElementById('contractDownloadContainer');
  if (!container) return;
  try {
    const cRes = await window.api.fetch(`/contracts/project/${projectId}`);
    if (cRes && cRes.contract) {
      const token = localStorage.getItem('elm_accessToken');
      container.innerHTML = `
        <button class="btn btn-outline btn-sm" onclick="window.open('http://localhost:4000/api/contracts/${cRes.contract._id}/pdf?token=${token}', '_blank')" style="border-color:var(--color-navy);color:var(--color-navy);font-size:12px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;">
          📄 تحميل العقد الرقمي PDF
        </button>
      `;
    }
  } catch (_) {}
}

function renderEscrow(e) {
  const container = document.getElementById('mainContent');
  const milestones = e.milestones || [];
  const netAmount = e.totalAmount - (e.commissionAmount || 0);

  const rows = milestones.map((m, i) => `
    <div class="milestone-row ${m.status === 'released' ? 'released' : ''}">
      <div class="milestone-info">
        <div class="milestone-name">${m.title || 'مرحلة ' + (i + 1)}</div>
        <div class="milestone-pct">${m.percentage || '—'}% من صافي المستحق للمقاول</div>
      </div>
      <div class="milestone-amount">${(m.amount || 0).toLocaleString('ar-EG')} <small style="font-size:12px;font-weight:600;color:var(--text-muted);">ج.م</small></div>
      <div>
        ${m.status === 'released'
          ? '<span class="milestone-status ms-released">✓ تم الصرف</span>'
          : m.status === 'disputed'
            ? '<span class="milestone-status" style="background:rgba(239,68,68,0.12); color:#ef4444; border:1px solid rgba(239,68,68,0.25);">⚠️ نزاع مفتوح</span>'
            : `
              <div style="display:flex; gap:8px;">
                <button onclick="release('${m._id}')" class="btn btn-primary btn-sm">صرف للمقاول</button>
                <button onclick="openDisputeModal('${m._id}')" class="btn btn-outline btn-sm" style="border-color:#ef4444;color:#ef4444;background:transparent;">⚠️ نزاع</button>
              </div>
            `
        }
      </div>
    </div>`).join('');

  let disputeNotice = '';
  if (e.status === 'disputed') {
    disputeNotice = `
      <div style="background:rgba(239,68,68,0.06); border:1.5px solid rgba(239,68,68,0.22); border-radius:var(--radius-md); padding:16px; margin-bottom:20px; display:flex; align-items:start; gap:12px; text-align:right;">
        <span style="font-size:20px; line-height: 1;">⚠️</span>
        <div>
          <h4 style="color:#b91c1c; font-weight:800; font-size:14px; margin-bottom:4px;">هناك نزاع مفتوح على هذا المشروع</h4>
          <p style="color:#7f1d1d; font-size:12px; line-height:1.6; margin:0;">السبب المذكور: "${e.disputeReason || '—'}"</p>
          <p style="color:var(--text-muted); font-size:11px; margin-top:6px; margin-bottom:0;">يقوم مراجعو المنصة حالياً بدراسة النزاع واتخاذ القرار المناسب لحفظ حقوق الطرفين.</p>
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    ${disputeNotice}
    <div class="escrow-hero" style="margin-top:0;">
      <div class="escrow-hero-inner">
        <div class="escrow-label">المبلغ المحجوز الإجمالي</div>
        <div class="escrow-value">${(e.totalAmount || 0).toLocaleString('ar-EG')} ج.م</div>
        <div class="escrow-sub">
          صافي للمقاول: ${netAmount.toLocaleString('ar-EG')} ج.م · عمولة المنصة: ${(e.commissionAmount || 0).toLocaleString('ar-EG')} ج.م
        </div>
      </div>
      <div class="escrow-icon">🛡️</div>
    </div>

    <div class="milestones-card">
      <div class="milestones-header">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="color:var(--color-gold);"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        مراحل الدفع
      </div>
      ${rows || '<div style="padding:40px;text-align:center;color:var(--text-muted);">لا توجد مراحل محددة</div>'}
    </div>
  `;
}

window.deposit = async function () {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'جاري الإيداع...';
  try {
    await window.api.fetch('/billing/deposit-escrow', {
      method: 'POST',
      body: JSON.stringify({ projectId }),
    });
    showToast('تم إيداع مبلغ الضمان بنجاح!', 'success');
    loadEscrow();
  } catch (err) {
    showToast(err.message || 'فشل الإيداع', 'error');
    btn.disabled = false; btn.textContent = '🔒 إيداع مبلغ الضمان الآن';
  }
};

window.release = async function (milestoneId) {
  if (!confirm('هل تأكدت من إتمام هذه المرحلة بشكل مرضٍ؟ لا يمكن التراجع عن هذا الإجراء.')) return;
  showToast('جاري صرف المبلغ...', 'info');
  try {
    await window.api.fetch(`/billing/${projectId}/release-milestone`, {
      method: 'POST',
      body: JSON.stringify({ milestoneId }),
    });
    showToast('تم صرف المبلغ للمقاول بنجاح! ✅', 'success');
    loadEscrow();
  } catch (err) {
    showToast(err.message || 'فشل الصرف', 'error');
  }
};

document.addEventListener('DOMContentLoaded', () => {
  injectLayout();
  if (projectId) loadEscrow();

  // Inject Dispute Modal
  if (!document.getElementById('disputeModal')) {
    const disputeModalHtml = `
      <div id="disputeModal" class="modal-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
        <div style="background:var(--bg-surface);border-radius:var(--radius-lg);padding:var(--space-8);max-width:500px;width:95%;box-shadow:var(--shadow-xl);position:relative;border:1px solid var(--border-default);">
          <button onclick="closeDisputeModal()" style="position:absolute;top:12px;left:12px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);">✕</button>
          <h3 style="font-size:var(--font-size-lg);font-weight:900;color:#ef4444;margin-bottom:var(--space-2);">⚠️ فتح نزاع رسمي</h3>
          <p style="font-size:var(--font-size-xs);color:var(--text-muted);margin-bottom:var(--space-5);">إذا واجهت مشكلة مع المقاول في هذه المرحلة ولم يتم التوصل لاتفاق، يمكنك فتح نزاع وسيقوم مسؤولو المنصة بالحسم بناءً على شروط التعاقد.</p>

          <div class="form-field">
            <label for="disputeReason" style="display:block;font-size:13px;font-weight:800;color:var(--color-navy);margin-bottom:8px;">سبب النزاع بالتفصيل *</label>
            <textarea id="disputeReason" style="width:100%; height:120px; padding:12px; border:1.5px solid var(--border-default); border-radius:var(--radius-sm); font-family:inherit; font-size:13px;" placeholder="اكتب بالتفصيل سبب الشكوى والمشاكل الفنية التي واجهتها (10 أحرف على الأقل)..."></textarea>
          </div>

          <button id="submitDisputeBtn" onclick="submitDispute()" class="btn btn-primary btn-full" style="background:#ef4444; border-color:#ef4444; margin-top:var(--space-5); font-size:var(--font-size-md); font-weight:800; color:white;">
            ⚠️ تقديم الشكوى وفتح النزاع
          </button>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', disputeModalHtml);
  }
});

let _disputeMilestoneId = null;

window.openDisputeModal = function(milestoneId) {
  _disputeMilestoneId = milestoneId;
  document.getElementById('disputeModal').style.display = 'flex';
  document.getElementById('disputeReason').value = '';
  document.getElementById('disputeReason').focus();
};

window.closeDisputeModal = function() {
  document.getElementById('disputeModal').style.display = 'none';
  _disputeMilestoneId = null;
};

window.submitDispute = async function() {
  const reason = document.getElementById('disputeReason').value.trim();
  if (!reason || reason.length < 10) {
    alert('يرجى كتابة سبب النزاع بالتفصيل (10 أحرف على الأقل)');
    return;
  }

  const btn = document.getElementById('submitDisputeBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري فتح النزاع...';

  try {
    await window.api.fetch(`/billing/${projectId}/dispute`, {
      method: 'POST',
      body: JSON.stringify({ milestoneId: _disputeMilestoneId, reason })
    });
    showToast('تم فتح النزاع بنجاح وسيقوم مسؤولو الإدارة بمراجعته ⚠️', 'success');
    closeDisputeModal();
    loadEscrow();
  } catch (err) {
    showToast(err.message || 'فشل فتح النزاع', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '⚠️ تقديم الشكوى وفتح النزاع';
  }
};
</script>
</body>
</html>
