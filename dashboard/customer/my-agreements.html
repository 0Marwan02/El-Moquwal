<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المقاول | اتفاقياتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">

  <style>
    .agreement-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-bottom: var(--space-5);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
    }
    .agreement-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-gold-light);
    }

    .agreement-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .agreement-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: 4px;
    }
    .agreement-meta {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .awarded-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--color-success);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .agreement-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-top: 1px dashed var(--border-default);
      border-bottom: 1px dashed var(--border-default);
      margin-bottom: var(--space-4);
    }

    .detail-item .lbl {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 2px;
    }
    .detail-item .val {
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
    }

    .contractor-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.15);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
    }
    .contractor-avatar-sm {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900;
      color: var(--color-navy-dark);
      flex-shrink: 0;
    }
    .contractor-info .name { font-size: var(--font-size-sm); font-weight: 800; color: var(--color-navy); }
    .contractor-info .phone { font-size: var(--font-size-xs); color: #065f46; font-weight: 600; }

    .state-msg {
      text-align: center;
      padding: var(--space-16) var(--space-8);
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
    }
    .state-msg .emoji { font-size: 40px; display: block; margin-bottom: var(--space-3); }
    .state-msg h4 { color: var(--color-navy); margin-bottom: var(--space-1); font-weight: 800; }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark">
          <img src="../../assets/images/logo.png" alt="المقاول">
        </div>
        <div class="sidebar-logo-text">المقاول</div>
      </div>

      <div class="sidebar-user">
        <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-dark));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--color-navy-dark);" id="sidebarAvatar">م</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebarUserName">جاري التحميل...</div>
          <div class="role">عميل</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section-label">الرئيسية</div>
        <a href="index.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" /></svg>
          لوحة التحكم
        </a>
        <a href="browse-projects.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" /></svg>
          تصفح المشاريع
        </a>
        <div class="sidebar-section-label">مشاريعي</div>
        <a href="post-project.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" /></svg>
          إضافة مشروع جديد
        </a>
        <a href="proposals.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" /></svg>
          عروض الأسعار
        </a>
        <a href="my-agreements.html" class="sidebar-item active">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" /></svg>
          اتفاقياتي
        </a>
      </nav>

      <div class="sidebar-cta">
        <button class="btn btn-ghost-light btn-full" id="logoutBtnMain">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
          </svg>
          تسجيل الخروج
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="dashboard-main">
      <div class="dashboard-topbar">
        <div class="topbar-page-title">اتفاقياتي</div>
        <div class="topbar-actions">
          <div class="topbar-user">
            <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--color-navy-dark);" id="topbarAvatar">م</div>
            <div class="topbar-user-name" id="topbarUserName">جاري...</div>
          </div>
        </div>
      </div>

      <div class="dashboard-content">
        <div class="page-head" style="margin-bottom: var(--space-8);">
          <h2 class="section-title" style="font-size:var(--font-size-lg);font-weight:800;color:var(--color-navy);">مشاريعي المكتملة التعاقد</h2>
          <p style="color:var(--text-muted); font-size:var(--font-size-sm);">المشاريع التي قبلت فيها عرض مقاول وبدأ التنفيذ.</p>
        </div>
        <div id="pageContent">
          <div class="state-msg"><span class="emoji">⏳</span><h4>جاري التحميل...</h4></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script>
    (() => {
      const TYPE_LABELS = {
        new_construction: 'بناء جديد', renovation: 'تجديد', finishing: 'تشطيبات',
        repair: 'إصلاح', extension: 'توسعة', electrical: 'كهرباء',
        plumbing: 'سباكة', demolition: 'هدم', other: 'أخرى'
      };

      const container = document.getElementById('pageContent');

      document.addEventListener('DOMContentLoaded', () => {
        const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
        if (user.name) {
          const initial = user.name.charAt(0) || 'م';
          document.getElementById('sidebarUserName').textContent = user.name;
          document.getElementById('topbarUserName').textContent = user.name;
          document.getElementById('sidebarAvatar').textContent = initial;
          document.getElementById('topbarAvatar').textContent = initial;
        }

        const logoutBtn = document.getElementById('logoutBtnMain');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            try { await window.api.fetch('/auth/logout', { method: 'POST' }); } catch (_) {}
            localStorage.removeItem('elm_accessToken');
            localStorage.removeItem('elm_user');
            window.location.href = '../../index.html';
          });
        }
      });

      async function load() {
        const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
        if (!user._id) {
          container.innerHTML = `<div class="state-msg"><span class="emoji">🔒</span><h4>يجب تسجيل الدخول أولاً</h4><a href="../../auth/login.html" class="btn btn-primary" style="margin-top:var(--space-4);">تسجيل الدخول</a></div>`;
          return;
        }

        let projects = [];
        try {
          const data = await window.api.fetch('/projects?status=awarded&limit=50');
          // Filter to this customer's awarded projects
          projects = (data.projects || []).filter(p => {
            const by = p.postedBy?._id || p.postedBy;
            return by === user._id;
          });
        } catch (err) {
          container.innerHTML = `<div class="state-msg"><span class="emoji">❌</span><h4>فشل التحميل</h4><p>${err.message}</p></div>`;
          return;
        }

        if (projects.length === 0) {
          container.innerHTML = `
            <div class="state-msg">
              <span class="emoji">🤝</span>
              <h4>لا توجد اتفاقيات حتى الآن</h4>
              <p>حين تقبل عرض أحد المقاولين سيظهر هنا</p>
              <a href="proposals.html" class="btn btn-primary" style="margin-top:var(--space-4);">استعراض عروض الأسعار</a>
            </div>`;
          return;
        }

        // Fetch accepted bids for each awarded project
        const cards = await Promise.all(projects.map(async p => {
          let contractorName = '—', contractorPhone = '—', contractorInitial = '؟', bidAmount = '—', awardedAt = '—';
          try {
            const bRes = await window.api.fetch(`/projects/${p._id}/bids`);
            const accepted = (bRes.bids || []).find(b => b.status === 'accepted');
            if (accepted) {
              contractorName = accepted.contractor?.name || '—';
              contractorPhone = accepted.contractor?.phone || '—';
              contractorInitial = contractorName.charAt(0);
              bidAmount = Number(accepted.amount).toLocaleString('ar-EG') + ' جنيه';
            }
          } catch (_) {}

          if (p.awardedAt) {
            awardedAt = new Date(p.awardedAt).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
          }

          return `
            <div class="agreement-card">
              <div class="agreement-header">
                <div>
                  <div class="agreement-title">${p.title}</div>
                  <div class="agreement-meta">${TYPE_LABELS[p.projectType] || '—'} • ${p.propertyDetails?.governorate || '—'} • ${p.propertyDetails?.area || '—'} م² • ${p.requiredEngineers != null ? p.requiredEngineers : 1} مهندس</div>
                </div>
                <span class="awarded-badge">✅ تم التعاقد</span>
              </div>

              <div class="contractor-row">
                <div class="contractor-avatar-sm">${contractorInitial}</div>
                <div class="contractor-info">
                  <div class="name">المقاول: ${contractorName}</div>
                  <div class="phone">📞 ${contractorPhone}</div>
                </div>
              </div>

              <div class="agreement-details">
                <div class="detail-item"><span class="lbl">قيمة العقد</span><span class="val">${bidAmount}</span></div>
                <div class="detail-item"><span class="lbl">تاريخ الترسية</span><span class="val">${awardedAt}</span></div>
                <div class="detail-item"><span class="lbl">المساحة</span><span class="val">${p.propertyDetails?.area || '—'} م²</span></div>
                <div class="detail-item"><span class="lbl">المهندسون المطلوبون</span><span class="val">${p.requiredEngineers != null ? p.requiredEngineers : 1}</span></div>
                <div class="detail-item"><span class="lbl">حالة المشروع</span><span class="val">مرسّى ✅</span></div>
              </div>

              <a href="proposals.html" class="btn btn-outline">عرض كل تفاصيل المشروع</a>
            </div>`;
        }));

        container.innerHTML = cards.join('');
      }

      load();
    })();
  </script>
</body>

</html>
