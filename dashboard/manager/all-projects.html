<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | كل المشاريع</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <style>
    .section-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }

    .pending-list {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-8);
    }
    .pending-list-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface-2);
    }
    .pending-list-title {
      font-size: var(--font-size-base);
      font-weight: 800;
      color: var(--color-navy);
    }
    .pending-list-count {
      background: var(--color-warning-bg);
      color: var(--color-warning);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .pending-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      transition: background var(--transition-fast);
    }
    .pending-item:last-child {
      border-bottom: none;
    }
    .pending-item:hover {
      background: var(--bg-surface-2);
    }
    .pending-item-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: var(--color-navy-dark);
      flex-shrink: 0;
    }
    .pending-item-name {
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: 2px;
    }
    .pending-item-meta {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .empty-state {
      padding: var(--space-12) var(--space-8);
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state-text {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .toast-stack {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 260px;
      max-width: 360px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: var(--bg-surface);
      box-shadow: var(--shadow-md);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
    }
    .toast.success {
      border-color: rgba(16, 185, 129, 0.35);
      background: var(--color-success-bg);
      color: #065f46;
    }
    .toast.error {
      border-color: rgba(239, 68, 68, 0.35);
      background: rgba(239, 68, 68, 0.08);
      color: #991b1b;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">

    <aside class="sidebar" id="adminSidebar" data-active="projects"></aside>

    <main class="dashboard-main">
      <div class="dashboard-topbar">
        <div class="topbar-page-title">كل المشاريع</div>
      </div>

      <div class="dashboard-content" style="padding-bottom: var(--space-10);">
        <div style="background:var(--bg-surface); border:1px solid var(--border-default); border-right:3px solid var(--color-gold); border-radius:var(--radius-sm); padding:var(--space-4) var(--space-5); margin-bottom:var(--space-6); font-size:12.5px; color:var(--text-muted); line-height:1.8;">
          <strong style="color:var(--color-navy);">حالات المشروع:</strong>
          <span style="color:var(--color-navy);">مسودة</span> (لم تُنشر بعد) ·
          <span style="color:var(--color-navy);">مفتوح</span> (يستقبل عروض المقاولين) ·
          <span style="color:var(--color-navy);">مرسّى</span> (تم تعيين مقاول والعمل جارٍ) ·
          <span style="color:var(--color-navy);">مغلق</span> (اكتمل المشروع).
          <br>أزرار <strong>⭐ تمييز</strong> و<strong>⚡ عاجل</strong> تظهر فقط للمشاريع <strong>المفتوحة</strong> لأنها ترفع ظهور المشروع لجذب العروض — لا معنى لها بعد إرساء أو إغلاق المشروع.
        </div>
        <div id="projectsRoot"></div>
      </div>
    </main>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/admin-dashboard.js"></script>
  <script>
    let projectsCacheByStatus = {};

    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function renderCategory(statusKey, statusLabel, projects) {
      const root = document.getElementById('projectsRoot');
      const count = projects?.length ?? 0;
      const bodyHtml = (projects && projects.length)
        ? projects.map(p => {
          const first = (p.title || '—').charAt(0) || '—';
          const gov = p.propertyDetails?.governorate || '—';
          const area = p.propertyDetails?.area || '—';
          const type = TYPE_LABELS[p.projectType] || p.projectType || '—';
          const featuredBadge = p.isFeatured ? '<span style="background:var(--color-gold);color:var(--color-navy-dark);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;margin-right:8px;display:inline-block;">⭐ مميز</span>' : '';
          const urgentBadge = p.isUrgent ? '<span style="background:#ef4444;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;margin-right:8px;display:inline-block;">⚡ عاجل</span>' : '';
          return `
            <div class="pending-item" style="display:flex; justify-content:space-between; align-items:center; width:100%; gap:15px; flex-wrap:wrap;">
              <div style="display:flex; align-items:center; gap:var(--space-4); min-width:0; flex:1;">
                <div class="pending-item-avatar">${escapeHtml(first)}</div>
                <div style="min-width:0;">
                  <div class="pending-item-name" style="display:flex; align-items:center; gap:4px; flex-wrap:wrap;">
                    ${escapeHtml(p.title || '—')}
                    ${featuredBadge}
                    ${urgentBadge}
                  </div>
                  <div class="pending-item-meta">
                    ${escapeHtml(type)} · ${escapeHtml(gov)} · ${escapeHtml(area)} م² · الحالة: ${escapeHtml(statusLabel)}
                  </div>
                </div>
              </div>
              ${p.status === 'open' && window.__hasPermManageFeatured ? `
              <div style="display:flex; gap:8px;" class="project-item-actions">
                <button class="btn btn-sm ${p.isFeatured ? 'btn-primary' : 'btn-outline'}" onclick="toggleFeatured('${p._id}', ${!p.isFeatured})" style="font-size:11px; padding:6px 12px; margin:0;">
                  ${p.isFeatured ? '❌ إلغاء التميز' : '⭐ تمييز'}
                </button>
                <button class="btn btn-sm ${p.isUrgent ? 'btn-primary' : 'btn-outline'}" onclick="toggleUrgent('${p._id}', ${!p.isUrgent})" style="font-size:11px; padding:6px 12px; margin:0; ${p.isUrgent ? 'background:#ef4444;color:#fff;border-color:#ef4444;' : 'border-color:#ef4444;color:#ef4444;'}">
                  ${p.isUrgent ? '❌ عادي' : '⚡ عاجل'}
                </button>
              </div>
              ` : ''}
            </div>`;
        }).join('')
        : `<div class="empty-state"><div class="empty-state-text">لا توجد مشاريع هنا.</div></div>`;

      const elId = `cat_${statusKey}`;
      return `
        <h2 class="section-title" style="margin-top:var(--space-10);" id="${elId}">${statusLabel}</h2>
        <div class="pending-list">
          <div class="pending-list-header">
            <span class="pending-list-title">قائمة المشاريع</span>
            <span class="pending-list-count">${count}</span>
          </div>
          <div id="catBody_${statusKey}">
            ${bodyHtml}
          </div>
        </div>`;
    }

    const TYPE_LABELS = {
      new_construction: 'بناء جديد',
      renovation: 'تجديد',
      finishing: 'تشطيبات',
      repair: 'إصلاح',
      extension: 'توسعة',
      electrical: 'كهرباء',
      plumbing: 'سباكة',
      demolition: 'هدم',
      other: 'أخرى'
    };

    (async () => {
      const user = await window.adminDash.bootAdminPage({ active: 'projects', requirePerm: 'view_projects' });
      if (!user) return;

      window.__hasPermManageFeatured = window.adminDash.hasPerm(user, 'manage_featured');

      const categories = [
        { key: 'draft', label: 'مسودات' },
        { key: 'open', label: 'مشاريع مفتوحة' },
        { key: 'closed', label: 'مشاريع مغلقة' },
        { key: 'awarded', label: 'مرسّاة' },
      ];

      const root = document.getElementById('projectsRoot');
      root.innerHTML = '';

      for (const cat of categories) {
        // skeleton
        root.insertAdjacentHTML('beforeend', `
          <div class="empty-state" style="padding:var(--space-10) 0;">
            <div class="empty-state-text">جاري تحميل: ${escapeHtml(cat.label)}...</div>
          </div>
        `);
        try {
          const res = await window.api.fetch(`/admin/projects?status=${encodeURIComponent(cat.key)}&limit=30`);
          const projects = res.projects || [];

          // remove skeleton last node
          root.lastElementChild?.remove();
          root.insertAdjacentHTML('beforeend', renderCategory(cat.key, cat.label, projects));
        } catch (e) {
          root.lastElementChild?.remove();
          root.insertAdjacentHTML('beforeend', `
            <div class="empty-state">
              <div class="empty-state-text">فشل تحميل: ${escapeHtml(cat.label)} — ${escapeHtml(e.message)}</div>
            </div>
          `);
        }
      }
    })();
    window.toggleFeatured = async function(projectId, isFeatured) {
      try {
        await window.api.fetch(`/projects/${projectId}/feature`, {
          method: 'PUT',
          body: JSON.stringify({ isFeatured })
        });
        showToast('تم تحديث حالة تمييز المشروع بنجاح!', 'success');
        setTimeout(() => location.reload(), 900);
      } catch (err) {
        showToast(err.message || 'فشل التحديث', 'error');
      }
    };

    window.toggleUrgent = async function(projectId, isUrgent) {
      try {
        await window.api.fetch(`/projects/${projectId}/feature`, {
          method: 'PUT',
          body: JSON.stringify({ isUrgent })
        });
        showToast('تم تحديث حالة صفة عاجل للمشروع بنجاح!', 'success');
        setTimeout(() => location.reload(), 900);
      } catch (err) {
        showToast(err.message || 'فشل التحديث', 'error');
      }
    };
  </script>
</body>

</html>
