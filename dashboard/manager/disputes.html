<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | النزاعات والشكاوى</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <style>
    .section-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }

    .dispute-list {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-8);
    }
    .dispute-list-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface-2);
    }
    .dispute-list-title {
      font-size: var(--font-size-base);
      font-weight: 800;
      color: var(--color-navy);
    }
    .dispute-list-count {
      background: var(--color-error-bg);
      color: var(--color-error);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .dispute-card {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      transition: background var(--transition-fast);
    }
    .dispute-card:last-child {
      border-bottom: none;
    }
    .dispute-card:hover {
      background: var(--bg-surface-2);
    }

    .dispute-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
    }
    .dispute-proj-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--color-navy);
    }
    .dispute-meta-line {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .dispute-status-tag {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-full);
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 800;
    }

    .dispute-parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    .party-info {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .party-info .role-lbl {
      font-size: 9px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .party-info .name-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-navy);
    }

    .dispute-reason-box {
      background: rgba(239, 68, 68, 0.03);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .dispute-reason-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--color-error);
      margin-bottom: 4px;
    }
    .dispute-reason-text {
      font-size: 13px;
      color: #374151;
      line-height: 1.6;
    }

    .dispute-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed var(--border-default);
      padding-top: var(--space-4);
      margin-top: 2px;
    }
    .dispute-opened-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .empty-state {
      padding: var(--space-16) var(--space-8);
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      background: rgba(16, 185, 129, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-4);
    }
    .empty-state-icon svg {
      width: 30px;
      height: 30px;
      fill: var(--color-success);
    }
    .empty-state-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: 4px;
    }

    /* Modal Styling */
    .resolve-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.65);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: var(--space-6);
    }
    .resolve-modal-overlay.visible {
      display: flex;
    }
    .resolve-modal {
      width: 100%;
      max-width: 540px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xl);
      padding: var(--space-8);
      position: relative;
    }
    .resolve-modal-close {
      position: absolute; top:12px; left:12px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-muted);
    }
    .resolve-modal h3 {
      font-size: 18px;
      font-weight: 900;
      color: var(--color-navy);
      margin: 0 0 var(--space-2);
    }
    .resolve-modal .sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }

    .form-group {
      margin-bottom: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 800;
      color: var(--color-navy);
    }
    .form-group select, .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-surface-2);
      color: var(--color-navy);
      transition: all var(--transition-base);
    }
    .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
      background: var(--bg-surface);
      border-color: var(--color-gold);
      outline: none;
    }
    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    .toast-stack {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">

    <aside class="sidebar" id="adminSidebar" data-active="disputes"></aside>

    <main class="dashboard-main">
      <div class="dashboard-topbar">
        <div class="topbar-page-title">النزاعات والشكاوى المالية</div>
      </div>

      <div class="dashboard-content">
        <h2 class="section-title">النزاعات والشكاوى (مالية + ضمان)</h2>
        
        <div class="dispute-list">
          <div class="dispute-list-header">
            <span class="dispute-list-title">النزاعات القائمة بانتظار الفصل</span>
            <span class="dispute-list-count" id="disputeListCount">—</span>
          </div>
          <div id="disputeListBody">
            <div class="empty-state">
              <div style="font-size:24px;margin-bottom:10px;">⏳</div>
              <div class="empty-state-text">جاري التحميل...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <!-- Resolve Dispute Modal -->
  <div class="resolve-modal-overlay" id="resolveModalOverlay">
    <div class="resolve-modal">
      <button onclick="closeResolveModal()" class="resolve-modal-close">✕</button>
      <h3 id="resolveModalTitle">حسم النزاع المالي</h3>
      <p class="sub" id="resolveModalSub">سيتم تطبيق هذا القرار فورياً على مراحل الدفع للمشروع وسحب أو تحرير الأموال من الضمان.</p>

      <form id="resolveForm" onsubmit="submitResolution(event)">
        <div class="form-group" id="decisionGroup">
          <label for="decisionSelect">القرار الإداري *</label>
          <select id="decisionSelect" required>
            <option value="">اختر القرار...</option>
            <option value="release_to_contractor">تحرير كامل الأموال للمقاول (إلغاء الشكوى)</option>
            <option value="refund_to_customer">استرداد كامل الأموال للعميل (تعويض كامل)</option>
            <option value="split">تقسيم المبالغ بالتراضي (50% لكل منهما)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="warrantyInput" id="warrantyLabel">قيمة خصم الضمان (اختياري - بالجنيه)</label>
          <input type="number" id="warrantyInput" min="0" value="0" placeholder="المبلغ المخصوم من ضمان المقاول لصالح العميل">
          <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">لا يمكن تجاوز سقف الضمان المحدد في إعدادات المنصة.</div>
        </div>

        <div class="form-group">
          <label for="adminNoteText">ملاحظات وحيثيات القرار الإداري *</label>
          <textarea id="adminNoteText" required placeholder="اكتب أسباب وحيثيات القرار الذي اتخذته بالتفصيل لإعلام الطرفين..."></textarea>
        </div>

        <button type="submit" id="submitResolveBtn" class="btn btn-primary btn-full" style="margin-top:var(--space-4); font-size:var(--font-size-md); font-weight:800;">
          ⚖️ اعتماد القرار وحسم النزاع
        </button>
      </form>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/admin-dashboard.js"></script>
  <script>
    let activeDisputes = [];

    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
      const t = ['success','error','info','warning'].includes(type) ? type : 'success';
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${t}`;
      toast.innerHTML = `
        <span class="toast-icon">${icons[t]}</span>
        <div class="toast-body"><div class="toast-msg">${message}</div></div>
        <button class="toast-close" onclick="this.closest('.toast-item').remove()">×</button>`;
      stack.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    async function loadDisputes() {
      const body = document.getElementById('disputeListBody');
      const countEl = document.getElementById('disputeListCount');
      if (!body) return;

      try {
        const res = await window.api.fetch('/admin/disputes?status=disputed');
        activeDisputes = res.disputes || [];
        
        const count = activeDisputes.length;
        if (countEl) countEl.textContent = count;

        if (count === 0) {
          body.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              </div>
              <div class="empty-state-text">لا توجد نزاعات مفتوحة حالياً 🎉</div>
              <div style="font-size:13px;color:var(--text-muted);">جميع المشاريع تسير بشكل منتظم</div>
            </div>`;
          return;
        }

        body.innerHTML = activeDisputes.map(d => {
          const date = d.disputeOpenedAt ? new Date(d.disputeOpenedAt).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'}) : '—';
          return `
            <div class="dispute-card">
              <div class="dispute-header">
                <div>
                  <h3 class="dispute-proj-title">${escapeHtml(d.project?.title || 'مشروع غير معروف')}</h3>
                  <div class="dispute-meta-line">المعرف: #${d._id.slice(-6).toUpperCase()} · المحافظة: ${escapeHtml(d.project?.propertyDetails?.governorate || '—')}</div>
                </div>
                <span class="dispute-status-tag" style="${d.type === 'contract' ? 'background:rgba(59,130,246,0.1);color:#2563eb;border-color:rgba(59,130,246,0.25);' : ''}">
                  ${d.type === 'contract' ? 'مطالبة ضمان 🛡️' : 'نزاع مالي ⚠️'}
                </span>
              </div>

              <div class="dispute-parties">
                <div class="party-info">
                  <div class="role-lbl">العميل (الطرف الأول)</div>
                  <div class="name-val">${escapeHtml(d.customer?.name || '—')}</div>
                  <div class="dispute-meta-line">${escapeHtml(d.customer?.phone || '')}</div>
                </div>
                <div class="party-info">
                  <div class="role-lbl">المقاول (الطرف الثاني)</div>
                  <div class="name-val">${escapeHtml(d.contractor?.name || '—')}</div>
                  <div class="dispute-meta-line">${escapeHtml(d.contractor?.phone || '')}</div>
                </div>
              </div>

              <div class="dispute-reason-box">
                <div class="dispute-reason-title">السبب المرفق من صاحب الشكوى:</div>
                <div class="dispute-reason-text">"${escapeHtml(d.disputeReason || 'لا يوجد سبب مفصل')}"</div>
              </div>

              <div class="dispute-footer">
                <span class="dispute-opened-date">تاريخ فتح النزاع: ${date}</span>
                <button onclick="openResolveModal('${d._id}', '${d.type}', '${d.project?._id || d.project}')" class="btn btn-primary btn-sm">⚖️ اتخاذ القرار وحسم النزاع</button>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        body.innerHTML = `<div style="text-align:center; padding:40px; color:var(--color-error);">فشل تحميل النزاعات: ${err.message}</div>`;
      }
    }

    let _selectedDisputeId = null;
    let _selectedDisputeType = null;
    let _selectedProjectId = null;

    window.openResolveModal = function(disputeId, disputeType, projectId) {
      _selectedDisputeId = disputeId;
      _selectedDisputeType = disputeType;
      _selectedProjectId = projectId;

      // الواجهة بتختلف حسب نوع النزاع — مطالبة الضمان مالهاش قرار مالي (release/refund/split)
      const isContract = disputeType === 'contract';
      const decisionGroup = document.getElementById('decisionGroup');
      const decisionSelect = document.getElementById('decisionSelect');
      decisionGroup.style.display = isContract ? 'none' : '';
      decisionSelect.required = !isContract;

      document.getElementById('resolveModalTitle').textContent =
        isContract ? 'معالجة مطالبة الضمان 🛡️' : 'حسم النزاع المالي ⚠️';
      document.getElementById('resolveModalSub').textContent = isContract
        ? 'سيتم إغلاق مطالبة الضمان وتسجيل التعويض المعتمد للعميل (إن وُجد).'
        : 'سيتم تطبيق هذا القرار فورياً على مراحل الدفع للمشروع وسحب أو تحرير الأموال من الضمان.';
      document.getElementById('warrantyLabel').textContent = isContract
        ? 'قيمة التعويض للعميل (اختياري - بالجنيه)'
        : 'قيمة خصم الضمان (اختياري - بالجنيه)';

      document.getElementById('resolveModalOverlay').classList.add('visible');
      decisionSelect.value = '';
      document.getElementById('warrantyInput').value = '0';
      document.getElementById('adminNoteText').value = '';
    };

    window.closeResolveModal = function() {
      document.getElementById('resolveModalOverlay').classList.remove('visible');
      _selectedDisputeId = null;
      _selectedDisputeType = null;
      _selectedProjectId = null;
    };

    window.submitResolution = async function(e) {
      e.preventDefault();
      if (!_selectedDisputeId) return;

      const decision = document.getElementById('decisionSelect').value;
      const warrantyDeduction = +document.getElementById('warrantyInput').value || 0;
      const adminNote = document.getElementById('adminNoteText').value.trim();

      const btn = document.getElementById('submitResolveBtn');
      btn.disabled = true; btn.textContent = '⏳ جاري حسم النزاع...';

      try {
        let endpoint = '';
        let bodyPayload = {};
        if (_selectedDisputeType === 'contract') {
           endpoint = `/contracts/${_selectedDisputeId}/resolve`;
           bodyPayload = { resolution: adminNote, compensationAmount: warrantyDeduction };
        } else {
           endpoint = `/billing/${_selectedProjectId}/resolve-dispute`;
           bodyPayload = { decision, warrantyDeduction, adminNote };
        }

        await window.api.fetch(endpoint, {
          method: 'POST',
          body: JSON.stringify(bodyPayload)
        });
        showToast('تم حسم النزاع وتطبيق القرار بنجاح! ✅', 'success');
        closeResolveModal();
        loadDisputes();
      } catch (err) {
        showToast(err.message || 'فشل حسم النزاع', 'error');
      } finally {
        btn.disabled = false; btn.textContent = '⚖️ اعتماد القرار وحسم النزاع';
      }
    };

    (async () => {
      const user = await window.adminDash.bootAdminPage({ active: 'disputes', requirePerm: 'manage_disputes' });
      if (!user) return;
      loadDisputes();
    })();
  </script>
</body>

</html>
