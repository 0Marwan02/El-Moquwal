<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | سوق المواد</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <style>
    .section-title {
      font-size: var(--font-size-md); font-weight: 800; color: var(--color-navy);
      margin: var(--space-8) 0 var(--space-5); display: flex; align-items: center; gap: var(--space-3);
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-default); }
    .list-panel {
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: var(--space-8);
    }
    .row-item {
      padding: var(--space-5) var(--space-6); border-bottom: 1px solid var(--border-default);
      display: flex; justify-content: space-between; align-items: center; gap: var(--space-4); flex-wrap: wrap;
    }
    .row-item:last-child { border-bottom: none; }
    .row-item:hover { background: var(--bg-surface-2); }
    .row-title { font-weight: 800; color: var(--color-navy); }
    .row-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: 800;
    }
    .b-active   { background: rgba(16,185,129,0.12); color: #047857; }
    .b-inactive { background: var(--bg-surface-2); color: var(--text-muted); }
    .b-sold_out { background: rgba(239,68,68,0.1); color: #b91c1c; }
    .toast-stack { position: fixed; top: 18px; left: 18px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">
    <aside class="sidebar" id="adminSidebar" data-active="materials"></aside>

    <main class="dashboard-main">
      <div class="dashboard-topbar">
        <div class="topbar-page-title">إدارة سوق المواد B2B</div>
      </div>

      <div class="dashboard-content">
        <h2 class="section-title" style="margin-top:0;">🧱 المنتجات المعروضة</h2>
        <div class="list-panel" id="productsList">
          <div class="empty-state"><div class="empty-state-text">جاري التحميل...</div></div>
        </div>

        <h2 class="section-title">📋 أحدث طلبات الشراء</h2>
        <div class="list-panel" id="ordersList">
          <div class="empty-state"><div class="empty-state-text">جاري التحميل...</div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/admin-dashboard.js"></script>
  <script>
    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
      const t = ['success','error','info','warning'].includes(type) ? type : 'success';
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${t}`;
      toast.innerHTML = `<span class="toast-icon">${icons[t]}</span><div class="toast-body"><div class="toast-msg">${message}</div></div><button class="toast-close" onclick="this.closest('.toast-item').remove()">×</button>`;
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

    const STATUS_LABELS = { active: 'نشط', inactive: 'مخفي', sold_out: 'نفد المخزون' };
    const ORDER_LABELS  = { pending: 'بانتظار البائع', confirmed: 'مؤكد', shipped: 'تم الشحن', delivered: 'تم التسليم', cancelled: 'ملغي' };

    async function load() {
      try {
        const res = await window.api.fetch('/admin/materials?limit=50');
        const products = res.products || [];
        const orders   = res.orders || [];

        document.getElementById('productsList').innerHTML = products.length
          ? products.map(p => `
              <div class="row-item">
                <div style="min-width:0; flex:1;">
                  <div class="row-title">
                    ${escapeHtml(p.name)}
                    <span class="badge b-${p.status}">${STATUS_LABELS[p.status] || p.status}</span>
                  </div>
                  <div class="row-meta">
                    السعر: ${(+p.price).toLocaleString('ar-EG')} ج.م${p.unit ? '/' + escapeHtml(p.unit) : ''}
                    · المخزون: ${p.stock ?? 0}
                    · البائع: ${escapeHtml(p.seller?.name || '—')}${p.seller?.phone ? ' (' + escapeHtml(p.seller.phone) + ')' : ''}
                    ${p.governorate ? ' · ' + escapeHtml(p.governorate) : ''}
                  </div>
                  ${p.description ? `<div class="row-meta">📝 ${escapeHtml(p.description)}</div>` : ''}
                </div>
                <button class="btn btn-sm" onclick="removeProduct('${p._id}', '${escapeHtml(p.name)}')"
                  style="background:var(--color-error-bg); color:var(--color-error); border:1px solid rgba(239,68,68,0.3); font-size:11px; padding:6px 14px; margin:0;">
                  🗑️ حذف المنتج
                </button>
              </div>`).join('')
          : '<div class="empty-state"><div class="empty-state-text">لا توجد منتجات معروضة في السوق</div></div>';

        document.getElementById('ordersList').innerHTML = orders.length
          ? orders.map(o => `
              <div class="row-item">
                <div style="min-width:0; flex:1;">
                  <div class="row-title">${escapeHtml(o.product?.name || 'منتج محذوف')}</div>
                  <div class="row-meta">
                    الكمية: ${o.quantity} · الإجمالي: ${(o.totalPrice || 0).toLocaleString('ar-EG')} ج.م
                    · المشتري: ${escapeHtml(o.buyer?.name || '—')} · البائع: ${escapeHtml(o.seller?.name || '—')}
                    · ${o.createdAt ? new Date(o.createdAt).toLocaleDateString('ar-EG') : '—'}
                  </div>
                </div>
                <span class="badge ${o.status === 'cancelled' ? 'b-sold_out' : o.status === 'pending' ? 'b-inactive' : 'b-active'}">${ORDER_LABELS[o.status] || o.status}</span>
              </div>`).join('')
          : '<div class="empty-state"><div class="empty-state-text">لا توجد طلبات شراء بعد</div></div>';
      } catch (e) {
        document.getElementById('productsList').innerHTML = `<div class="empty-state"><div class="empty-state-text">تعذر التحميل — ${escapeHtml(e.message)}</div></div>`;
        document.getElementById('ordersList').innerHTML = '';
      }
    }

    window.removeProduct = async function (id, name) {
      if (!confirm(`حذف المنتج "${name}" نهائياً من السوق؟`)) return;
      try {
        await window.api.fetch(`/admin/materials/${id}`, { method: 'DELETE' });
        showToast('تم حذف المنتج بنجاح', 'success');
        load();
      } catch (e) {
        showToast(e.message || 'تعذر الحذف', 'error');
      }
    };

    (async () => {
      const user = await window.adminDash.bootAdminPage({ active: 'materials', requirePerm: 'manage_materials' });
      if (!user) return;
      load();
    })();
  </script>
</body>

</html>
