<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | طلبات المقاولين</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <style>
    .section-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }

    .pending-list {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-8);
    }
    .pending-list-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface-2);
    }
    .pending-list-title {
      font-size: var(--font-size-base);
      font-weight: 800;
      color: var(--color-navy);
    }
    .pending-list-count {
      background: var(--color-warning-bg);
      color: var(--color-warning);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .pending-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-default);
      transition: background var(--transition-fast);
    }
    .pending-item:last-child {
      border-bottom: none;
    }
    .pending-item:hover {
      background: var(--bg-surface-2);
    }
    .pending-item-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: var(--color-navy-dark);
      flex-shrink: 0;
    }
    .pending-item-name {
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: 2px;
    }
    .pending-item-meta {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }
    .pending-item-actions {
      margin-right: auto;
      display: flex;
      gap: var(--space-2);
    }

    .empty-state {
      padding: var(--space-12) var(--space-8);
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state-icon {
      width: 56px;
      height: 56px;
      background: var(--bg-surface-2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-4);
    }
    .empty-state-icon svg {
      width: 26px;
      height: 26px;
      fill: var(--text-light);
    }
    .empty-state-text {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    /* local action-btn loading state */
    .action-btn.is-loading {
      opacity: 0.65;
      pointer-events: none;
    }

    /* Modal */
    .manager-modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: var(--space-6);
    }
    .manager-modal-overlay.visible {
      display: flex;
    }
    .manager-modal {
      width: 100%;
      max-width: 520px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: var(--space-7);
    }
    .manager-modal h3 {
      margin: 0 0 var(--space-4);
      font-size: var(--font-size-md);
      font-weight: 900;
      color: var(--color-navy);
    }
    .manager-modal .sub {
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      line-height: 1.7;
      margin-bottom: var(--space-5);
    }
    .manager-modal textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 12px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      background: var(--bg-surface-2);
      color: var(--color-navy);
      margin-bottom: var(--space-5);
    }
    .manager-modal-actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark" style="display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
        </div>
        <div class="sidebar-logo-text">المقاول</div>
      </div>

      <div class="sidebar-user">
        <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;" id="sidebarAvatar">أ</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebarUserName">جاري التحميل...</div>
          <div class="role" style="background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.2);color:#93c5fd;">مدير النظام</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section-label">الإدارة</div>
        <a href="index.html" class="sidebar-item">لوحة التحكم</a>
        <a href="pending-contractors.html" class="sidebar-item active" id="pendingNavItem">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          طلبات المقاولين
          <span class="sidebar-badge" id="sidebarPendingCount">0</span>
        </a>
        <a href="all-projects.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          كل المشاريع
        </a>
      </nav>

      <div class="sidebar-cta">
        <button class="btn btn-ghost-light btn-full" id="logoutBtn">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          تسجيل الخروج
        </button>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-topbar">
        <div class="topbar-page-title">طلبات المقاولين</div>
      </div>

      <div class="dashboard-content">
        <h2 class="section-title">بانتظار الموافقة</h2>
        <div class="pending-list">
          <div class="pending-list-header">
            <span class="pending-list-title">طلبات جديدة</span>
            <span class="pending-list-count" id="pendingListCount">—</span>
          </div>
          <div id="pendingListBody">
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              </div>
              <div class="empty-state-text">جاري التحميل...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <div class="manager-modal-overlay" id="rejectModalOverlay" aria-hidden="true">
    <div class="manager-modal" role="dialog" aria-modal="true" aria-labelledby="rejectModalTitle">
      <h3 id="rejectModalTitle">رفض طلب المقاول</h3>
      <div class="sub">اكتب سبب الرفض (يُرسل للـ API ويجب أن يكون 3 أحرف على الأقل).</div>
      <textarea id="rejectReasonInput" placeholder="اكتب سبب الرفض..."></textarea>
      <div class="manager-modal-actions">
        <button type="button" class="btn btn-outline" id="rejectModalCancel">إلغاء</button>
        <button type="button" class="btn btn-primary" id="rejectModalConfirm">تأكيد الرفض</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script>
    let pendingContractors = [];

    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
      const t = ['success','error','info','warning'].includes(type) ? type : 'success';
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${t}`;
      toast.innerHTML = `
        <span class="toast-icon">${icons[t]}</span>
        <div class="toast-body"><div class="toast-msg">${message}</div></div>
        <button class="toast-close" onclick="this.closest('.toast-item').remove()">×</button>`;
      stack.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function setPendingCounts(count) {
      const countEl = document.getElementById('pendingListCount');
      if (countEl) countEl.textContent = count;
      const badge = document.getElementById('sidebarPendingCount');
      if (badge) badge.textContent = count;
    }

    function renderPendingList() {
      const body = document.getElementById('pendingListBody');
      if (!body) return;

      const count = pendingContractors.length;
      setPendingCounts(count);

      if (count === 0) {
        body.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="empty-state-text">لا توجد طلبات معلقة الآن</div>
        </div>`;
        return;
      }

      const SPECIALTY_LABELS = {
        civil_engineer: 'مهندس مدني', architect: 'مهندس معماري',
        electrical: 'كهربائي', plumber: 'سباك', carpenter: 'نجار',
        painter: 'نقّاش', general_contractor: 'مقاول عام',
        finishing: 'تشطيبات', other: 'أخرى'
      };
      const API_BASE = window.__API_BASE__ || 'http://localhost:4000';

      function docLink(fileObj, label) {
        if (!fileObj || !fileObj.filename) return `<span style="color:var(--text-muted);font-size:12px;">—</span>`;
        const url = `${API_BASE}/uploads/${fileObj.filename}`;
        return `<a href="${url}" target="_blank" rel="noopener"
          style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
                 color:var(--color-accent);background:rgba(59,130,246,0.08);
                 border:1px solid rgba(59,130,246,0.2);border-radius:6px;padding:3px 8px;text-decoration:none;">
          📎 ${label}
        </a>`;
      }

      body.innerHTML = pendingContractors.map(c => `
        <div class="pending-item" style="flex-wrap:wrap;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-6);">
          <div class="pending-item-avatar" style="align-self:center;">${(c.name || '?').charAt(0)}</div>
          <div style="min-width:0;flex:1;">
            <div class="pending-item-name">${escapeHtml(c.name || '—')}</div>
            <div class="pending-item-meta" style="margin-bottom:var(--space-2);">
              ${escapeHtml(SPECIALTY_LABELS[c.specialty] || c.specialty || '—')} ·
              ${escapeHtml(String(c.yearsOfExperience || 0))} سنة خبرة ·
              ${escapeHtml(c.email || '')} ·
              ${escapeHtml(c.phone || '')}
            </div>
            ${c.bio ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-2);">${escapeHtml(c.bio)}</div>` : ''}
            <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);margin-top:var(--space-2);">
              ${docLink(c.nationalIdPhoto, 'بطاقة الرقم القومي')}
              ${c.certificate ? docLink(c.certificate, 'الشهادة') : '<span style="font-size:11px;color:var(--text-muted);">بدون شهادة</span>'}
              ${c.membershipCard ? docLink(c.membershipCard, 'كارنيه النقابة') : ''}
              ${c.profilePicture ? docLink(c.profilePicture, 'صورة شخصية') : ''}
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:var(--space-2);">
              آخر 4 أرقام من الرقم القومي: ${escapeHtml(c.nationalIdLast4 || '—')}
            </div>
          </div>
          <div class="pending-item-actions" style="align-self:center;margin-right:0;">
            <button class="btn btn-sm btn-accept action-btn" data-action="approve" data-id="${c._id}">✓ موافقة</button>
            <button class="btn btn-sm btn-reject action-btn" data-action="reject" data-id="${c._id}">✕ رفض</button>
          </div>
        </div>
      `).join('');
    }

    function openRejectModal(contractorId) {
      const overlay = document.getElementById('rejectModalOverlay');
      const input = document.getElementById('rejectReasonInput');
      if (!overlay || !input) return;

      overlay.classList.add('visible');
      overlay.setAttribute('aria-hidden', 'false');
      window.__rejectContractorId = contractorId;
      input.value = '';
      input.focus();
    }

    function closeRejectModal() {
      const overlay = document.getElementById('rejectModalOverlay');
      if (!overlay) return;
      overlay.classList.remove('visible');
      overlay.setAttribute('aria-hidden', 'true');
      window.__rejectContractorId = null;
    }

    // Modal bindings
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('rejectModalOverlay');
      const cancelBtn = document.getElementById('rejectModalCancel');
      const confirmBtn = document.getElementById('rejectModalConfirm');
      const reasonInput = document.getElementById('rejectReasonInput');

      if (!overlay || !cancelBtn || !confirmBtn || !reasonInput) return;

      cancelBtn.addEventListener('click', () => closeRejectModal());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeRejectModal(); });

      confirmBtn.addEventListener('click', async () => {
        const id = window.__rejectContractorId;
        const reason = (reasonInput.value || '').trim();
        if (!id) { showToast('لم يتم تحديد المقاول', 'error'); return; }
        if (reason.length < 3) { showToast('اكتب سبب رفض (3 أحرف على الأقل)', 'error'); return; }

        const actionButtons = document.querySelectorAll(`.action-btn[data-id="${id}"]`);
        actionButtons.forEach(b => b.classList.add('is-loading'));

        try {
          await window.api.fetch(`/admin/contractors/${id}/reject`, {
            method: 'POST',
            body: JSON.stringify({ reason }),
          });
          pendingContractors = pendingContractors.filter(c => c._id !== id);
          renderPendingList();
          showToast('تم رفض طلب المقاول بنجاح', 'success');
          closeRejectModal();
        } catch (e) {
          showToast(`فشل الرفض: ${e.message}`, 'error');
        } finally {
          actionButtons.forEach(b => b.classList.remove('is-loading'));
        }
      });
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const userJSON = localStorage.getItem('elm_user');
      if (!userJSON) { window.location.href = '../../auth/admin-login.html'; return; }

      let user;
      try { user = JSON.parse(userJSON); } catch (_) { window.location.href = '../../auth/admin-login.html'; return; }
      if (user.role !== 'admin') { window.location.href = '../../auth/login.html'; return; }

      const initial = (user.name || 'أ').charAt(0);
      const sbName = document.getElementById('sidebarUserName');
      if (sbName) sbName.textContent = user.name || 'مدير النظام';
      const sbAvatar = document.getElementById('sidebarAvatar');
      if (sbAvatar) sbAvatar.textContent = initial;

      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('elm_accessToken');
          localStorage.removeItem('elm_user');
          window.location.href = '../../index.html';
        });
      }

      try {
        const contractorsData = await window.api.fetch('/admin/contractors/pending');
        pendingContractors = contractorsData.items || [];
      } catch (e) {
        pendingContractors = [];
        showToast(`تعذر تحميل الطلبات: ${e.message}`, 'error');
      }
      renderPendingList();

      document.getElementById('pendingListBody').addEventListener('click', async (event) => {
        const btn = event.target.closest('.action-btn');
        if (!btn) return;

        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (!id || !action) return;

        const actionButtons = document.querySelectorAll(`.action-btn[data-id="${id}"]`);
        actionButtons.forEach(b => b.classList.add('is-loading'));

        try {
          if (action === 'reject') {
            actionButtons.forEach(b => b.classList.remove('is-loading'));
            openRejectModal(id);
            return;
          }

          await window.api.fetch(`/admin/contractors/${id}/approve`, { method: 'POST' });
          pendingContractors = pendingContractors.filter(c => c._id !== id);
          renderPendingList();
          showToast('تمت الموافقة على المقاول بنجاح', 'success');
        } catch (e) {
          showToast(`فشل الإجراء: ${e.message}`, 'error');
        } finally {
          actionButtons.forEach(b => b.classList.remove('is-loading'));
        }
      });
    });
  </script>
</body>

</html>
