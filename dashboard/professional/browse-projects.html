<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">

    rel="stylesheet">

  <style>

    /* ====== Page Layout ====== */
    .browse-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: var(--space-6);
      align-items: start;
    }

    /* ====== Filter Toggle Button (mobile only) ====== */
    .filter-toggle-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--bg-surface);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
      cursor: pointer;
      margin-bottom: var(--space-4);
      transition: all var(--transition-base);
    }
    .filter-toggle-btn:hover {
      border-color: var(--color-gold);
      color: var(--color-gold-dark);
    }
    .filter-toggle-btn svg {
      width: 18px; height: 18px; fill: currentColor; flex-shrink: 0;
    }

    /* ====== Filter Sidebar (Luxury) ====== */
    .filters {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 20px;
    }

    .filters h3 {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filters h3::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }

    .filter-group {
      margin-bottom: var(--space-5);
    }

    .filter-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-surface-2);
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      color: var(--text-primary);
      transition: all var(--transition-base);
    }

    .filter-group select:focus {
      border-color: var(--color-gold);
      background: var(--bg-surface);
    }

    .filter-reset {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--text-muted);
      transition: all var(--transition-base);
    }

    .filter-reset:hover {
      border-color: var(--color-error);
      color: var(--color-error);
    }

    /* ====== Projects Grid ====== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--space-5);
    }

    .project-card {
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      transition: all var(--transition-base);
      box-shadow: var(--shadow-sm);
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--color-gold-light);
    }

    .pc-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--color-gold-subtle);
      color: var(--color-gold-dark);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pc-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      line-height: 1.5;
    }

    .pc-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-top: 1px dashed var(--border-default);
      border-bottom: 1px dashed var(--border-default);
    }

    .pc-meta-item .lbl {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 2px;
      display: block;
    }

    .pc-meta-item .val {
      font-size: var(--font-size-sm);
      color: var(--color-navy);
      font-weight: 700;
    }

    .pc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pc-bids-count {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .pc-bids-count strong {
      color: var(--color-navy);
      font-weight: 800;
    }

    /* Bid Modal */
    .blind-note {
      padding: 12px 16px;
      background: rgba(59, 130, 246, 0.08);
      border-right: 3px solid #3b82f6;
      color: #1e40af;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: var(--space-5);
    }

    @media (max-width: 1024px) {
      .browse-wrap {
        grid-template-columns: 1fr;
      }
    }

    /* ====== Mobile Filter Overlay ====== */
    @media (max-width: 768px) {
      .filter-toggle-btn {
        display: flex;
      }

      .filters {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        border-radius: 0;
        overflow-y: auto;
        padding-top: var(--space-8);
      }

      .filters.filters-visible {
        display: block;
      }

      .filter-close-btn {
        display: flex !important;
      }
    }

    /* Hide close button on desktop */
    .filter-close-btn {
      display: none;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      margin-bottom: var(--space-4);
    }
    .filter-close-btn svg {
      width: 18px; height: 18px; fill: currentColor;
    }

    .toast-stack {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 260px;
      max-width: 360px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: var(--bg-surface);
      box-shadow: var(--shadow-md);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
    }
    .toast.success {
      border-color: rgba(16,185,129,0.35);
      background: var(--color-success-bg);
      color: #065f46;
    }
    .toast.error {
      border-color: rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.08);
      color: #991b1b;
    }
  </style>
</head>

  <script>
    /* ============================================================
       browse-projects.js (inline)
       Blind bid system:
         - كل مقاول يشوف بس عدد العروض (count فقط)
         - لما يقدم عرض يشوف قيمة عرضه بس (لا يرى عروض الآخرين)
       ============================================================ */

    (() => {
      if (!localStorage.getItem('elm_user') || !localStorage.getItem('elm_accessToken')) {
        window.location.href = '../../auth/login.html';
        return;
      }

      // ====== Mock Data — يستبدل بـ API call ======
      const TYPE_LABELS = {
        new_construction: 'بناء جديد', renovation: 'تجديد',
        finishing: 'تشطيبات', repair: 'إصلاح',
        extension: 'توسعة', electrical: 'كهرباء',
        plumbing: 'سباكة', demolition: 'هدم',
        other: 'أخرى'
      };
      const BUDGET_LABELS = {
        under_50k: 'أقل من 50,000',
        '50k_200k': '50,000 - 200,000',
        '200k_500k': '200,000 - 500,000',
        '500k_1m': '500,000 - 1 مليون',
        above_1m: 'أكثر من 1 مليون'
      };
      const TIMELINE_LABELS = {
        within_week: 'خلال أسبوع', within_month: 'خلال شهر',
        '1_3_months': '1 - 3 أشهر', '3_6_months': '3 - 6 أشهر',
        flexible: 'مرن'
      };

      // Mock projects replaced with Real data from API
      let PROJECTS = [];

      // load real projects
      async function hydrateMyBids() {
        await Promise.all(
          PROJECTS.map(async (p) => {
            try {
              const b = await window.api.fetch(`/projects/${p.id}/bids`);
              if (b.myBid) {
                myBids[p.id] = { amount: b.myBid.amount, message: b.myBid.message || '' };
              }
            } catch (_) { /* ignore */ }
          })
        );
      }

      async function loadProjects() {
        try {
          const data = await window.api.fetch('/projects');
          PROJECTS = data.projects.map(p => ({
            id: p._id,
            type: p.projectType,
            title: p.title,
            governorate: p.propertyDetails?.governorate || 'غير محدد',
            area: p.propertyDetails?.area || 0,
            timeline: p.timeline,
            budget: p.budgetRange,
            bidsCount: p.bidsCount || 0
          }));
          await hydrateMyBids();
          renderProjects();
        } catch (err) {
          console.error('Error loading projects', err);
        }
      }

      function showToast(message, type = 'success') {
        const stack = document.getElementById('toastStack');
        if (!stack) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        stack.appendChild(toast);
        setTimeout(() => toast.remove(), 3200);
      }

      // storage: {projectId: {amount, message}}  — the bids this contractor has submitted
      const myBids = {};

      // ====== Rendering ======
      const grid = document.getElementById('projectsGrid');

      function renderProjects() {
        // Apply filters
        const fType = document.getElementById('f-type').value;
        const fGov = document.getElementById('f-gov').value;
        const fBudget = document.getElementById('f-budget').value;

        const filtered = PROJECTS.filter(p => {
          if (fType && p.type !== fType) return false;
          if (fGov && p.governorate !== fGov) return false;
          if (fBudget && p.budget !== fBudget) return false;
          return true;
        });

        if (filtered.length === 0) {
          grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:var(--space-16);color:var(--text-muted);">
          <div style="font-size:48px;margin-bottom:var(--space-3);">🔍</div>
          <h4 style="color:var(--color-navy);margin-bottom:var(--space-2);">لا توجد مشاريع مطابقة</h4>
          <p>جرب تغيير الفلاتر لعرض مشاريع أكتر</p>
        </div>`;
          return;
        }

        grid.innerHTML = filtered.map(p => {
          const bid = myBids[p.id];
          return `
        <article class="project-card">
          <span class="pc-tag">${TYPE_LABELS[p.type] || '—'}</span>
          <h3 class="pc-title">${p.title}</h3>

          <div class="pc-meta">
            <div class="pc-meta-item">
              <span class="lbl">المحافظة</span>
              <span class="val">${p.governorate}</span>
            </div>
            <div class="pc-meta-item">
              <span class="lbl">المساحة</span>
              <span class="val">${p.area} م²</span>
            </div>
            <div class="pc-meta-item">
              <span class="lbl">الجدول</span>
              <span class="val">${TIMELINE_LABELS[p.timeline] || '—'}</span>
            </div>
            <div class="pc-meta-item">
              <span class="lbl">الميزانية</span>
              <span class="val">${BUDGET_LABELS[p.budget] || '—'}</span>
            </div>
          </div>

          <div class="pc-bottom">
            <span class="pc-bids-count">
              📨 <strong>${p.bidsCount}</strong> عرض مقدم
            </span>
          </div>

          <div style="display:flex;flex-direction:column;gap:10px;margin-top:var(--space-4);">
            <a href="project-detail.html?id=${encodeURIComponent(p.id)}" class="btn btn-primary btn-full">عرض التفاصيل وتقديم عرض</a>
            ${bid
              ? `<div class="already-bid">
                   ✅ لقد قدمت عرضاً بقيمة
                   <span class="amount">${Number(bid.amount).toLocaleString('ar-EG')} جنيه</span>
                 </div>`
              : ''
            }
          </div>
        </article>`;
        }).join('');
      }

      // ====== Sidebar & Topbar Populating ======
      document.addEventListener('DOMContentLoaded', () => {
        const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
        if (user.name) {
          const firstName = user.name.split(' ')[0];
          const initial = firstName.charAt(0) || 'م';

          const elements = {
            'sidebarUserName': user.name,
            'topbarUserName': user.name,
            'sidebarAvatar': initial,
            'topbarAvatar': initial
          };

          for (const [id, val] of Object.entries(elements)) {
            const el = document.getElementById(id);
            if (el) el.textContent = val;
          }
        }

        const logoutBtn = document.getElementById('logoutBtnMain');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            try { await window.api.fetch('/auth/logout', { method: 'POST' }); } catch (_) { }
            localStorage.removeItem('elm_accessToken');
            localStorage.removeItem('elm_user');
            window.location.href = '../../index.html';
          });
        }

        // ====== Mobile Filter Toggle ======
        const filterToggleBtn = document.getElementById('filterToggleBtn');
        const filterSidebar = document.getElementById('filterSidebar');
        const filterCloseBtn = document.getElementById('filterCloseBtn');
        if (filterToggleBtn && filterSidebar) {
          filterToggleBtn.addEventListener('click', () => filterSidebar.classList.add('filters-visible'));
        }
        if (filterCloseBtn && filterSidebar) {
          filterCloseBtn.addEventListener('click', () => filterSidebar.classList.remove('filters-visible'));
        }

        // ====== Filter bindings ======
        ['f-type', 'f-gov', 'f-budget'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.addEventListener('change', renderProjects);
        });

        const resetBtn = document.getElementById('resetFilters');
        if (resetBtn) {
          resetBtn.addEventListener('click', () => {
            document.getElementById('f-type').value = '';
            document.getElementById('f-gov').value = '';
            document.getElementById('f-budget').value = '';
            renderProjects();
            if (filterSidebar) filterSidebar.classList.remove('filters-visible');
          });
        }
      });

      // Initial load
      loadProjects();
    })();
  </script>
</body>

</html>
