<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المقاول | تصفح المشاريع</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/pro-dashboard.css">
  <style>
    /* Browse-specific layout */
    .browse-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: var(--space-6);
      align-items: start;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(330px, 100%), 1fr));
      gap: var(--space-5);
    }
    @media (max-width: 1100px) { .browse-wrap { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .filter-mobile-btn { display: flex !important; }
      .pro-filters { display: none; position: fixed; inset: 0; z-index: 200;
                     border-radius: 0; overflow-y: auto; }
      .pro-filters.open { display: block; }
    }

    /* Mobile filter button */
    .filter-mobile-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--bg-surface);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
      cursor: pointer;
      margin-bottom: var(--space-4);
      transition: all var(--transition-base);
    }
    .filter-mobile-btn:hover { border-color: var(--color-gold); color: var(--color-gold-dark); }
    .filter-mobile-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Results bar */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
      gap: var(--space-4);
    }
    .results-count {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      font-weight: 600;
    }
    .results-count strong { color: var(--color-navy); font-weight: 900; }
  </style>
</head>

<body class="dashboard-page">
<div class="dashboard-wrapper">

  <!-- ════════════════════════ SIDEBAR ════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-mark"><img src="../../assets/images/logo.png" alt="المقاول"></div>
      <div class="sidebar-logo-text">المقاول</div>
    </div>
    <div class="sidebar-user">
      <div id="sidebarAvatar"
        style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-dark));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--color-navy-dark);">م</div>
      <div class="sidebar-user-info">
        <div class="name" id="sidebarUserName">جاري التحميل...</div>
        <div class="role">مقاول</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">الرئيسية</div>
      <a href="index.html" class="sidebar-item">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        لوحة التحكم
      </a>
      <div class="sidebar-section-label">المشاريع</div>
      <a href="browse-projects.html" class="sidebar-item active">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        تصفح المشاريع
      </a>
      <a href="my-agreements.html" class="sidebar-item">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        اتفاقياتي
      </a>
      <a href="profile.html" class="sidebar-item">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        ملفي الشخصي
      </a>
    </nav>
    <div class="sidebar-cta">
      <button class="btn btn-ghost-light btn-full" id="logoutBtn">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- ════════════════════════ MAIN ════════════════════════ -->
  <main class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-page-title">تصفح المشاريع</div>
      <div class="topbar-actions">
        <div class="topbar-user">
          <div id="topbarAvatar"
            style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--color-navy-dark);">م</div>
          <div class="topbar-user-name" id="topbarUserName">جاري...</div>
        </div>
      </div>
    </div>

    <div class="dashboard-content">

      <!-- Page Header -->
      <div class="dash-page-head">
        <div>
          <div class="dash-page-title">المشاريع المتاحة للتعاقد</div>
          <p class="dash-page-subtitle">اكتشف الفرص المناسبة لتخصصك وقدم عروضك الفنية والمالية</p>
        </div>
      </div>

      <!-- Mobile filter toggle -->
      <button class="filter-mobile-btn" id="filterToggleBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zm-7-5v2h18v-2H3zM3 6v2h18V6H3z"/></svg>
        تصفية النتائج
      </button>

      <div class="browse-wrap">

        <!-- ── Filter Sidebar ── -->
        <div class="pro-filters" id="filterSidebar">
          <div class="pro-filters-head">
            <div class="pro-filters-title">
              <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zm-7-5v2h18v-2H3zM3 6v2h18V6H3z"/></svg>
              تصفية النتائج
            </div>
            <button id="filterCloseBtn" type="button" style="background:none;border:none;cursor:pointer;color:var(--text-muted);display:none;align-items:center;gap:6px;font-family:var(--font-main);font-size:12px;font-weight:700;">
              <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
              إغلاق
            </button>
          </div>

          <div class="pro-filter-group">
            <label class="pro-filter-label" for="f-type">نوع المشروع</label>
            <select class="pro-filter-select" id="f-type">
              <option value="">كل الأنواع</option>
              <option value="new_construction">بناء جديد</option>
              <option value="renovation">تجديد</option>
              <option value="finishing">تشطيبات</option>
              <option value="repair">إصلاح</option>
              <option value="extension">توسعة</option>
              <option value="electrical">كهرباء</option>
              <option value="plumbing">سباكة</option>
              <option value="other">أخرى</option>
            </select>
          </div>

          <div class="pro-filter-group">
            <label class="pro-filter-label" for="f-gov">المحافظة</label>
            <select class="pro-filter-select" id="f-gov">
              <option value="">كل المحافظات</option>
              <option>القاهرة</option><option>الجيزة</option><option>الإسكندرية</option>
              <option>القليوبية</option><option>الدقهلية</option><option>الشرقية</option>
              <option>الغربية</option><option>المنوفية</option><option>البحيرة</option>
              <option>بورسعيد</option><option>الإسماعيلية</option><option>السويس</option>
              <option>البحر الأحمر</option><option>الفيوم</option><option>المنيا</option>
              <option>أسيوط</option><option>سوهاج</option><option>قنا</option>
              <option>الأقصر</option><option>أسوان</option>
            </select>
          </div>

          <div class="pro-filter-group">
            <label class="pro-filter-label" for="f-budget">نطاق الميزانية</label>
            <select class="pro-filter-select" id="f-budget">
              <option value="">أي ميزانية</option>
              <option value="under_50k">أقل من 50,000 ج.م</option>
              <option value="50k_200k">50,000 — 200,000</option>
              <option value="200k_500k">200,000 — 500,000</option>
              <option value="500k_1m">500,000 — 1 مليون</option>
              <option value="above_1m">أكثر من 1 مليون</option>
            </select>
          </div>

          <button class="pro-filter-reset" id="resetFilters" type="button">
            إعادة تعيين الفلاتر
          </button>
        </div>

        <!-- ── Projects Grid ── -->
        <div>
          <div class="results-bar">
            <div class="results-count" id="resultsCount">جاري التحميل...</div>
          </div>
          <section class="projects-grid" id="projectsGrid">
            <!-- skeleton loaders -->
            <div style="grid-column:1/-1;display:flex;gap:var(--space-5);">
              <div style="flex:1;height:240px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border-default);animation:skeletonPulse 1.5s ease-in-out infinite;"></div>
              <div style="flex:1;height:240px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border-default);animation:skeletonPulse 1.5s ease-in-out infinite 0.15s;"></div>
              <div style="flex:1;height:240px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border-default);animation:skeletonPulse 1.5s ease-in-out infinite 0.3s;"></div>
            </div>
          </section>
        </div>
      </div>

    </div>
  </main>
</div>

<style>
@keyframes skeletonPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/dashboard-router.js"></script>
<script>
(() => {
  if (!localStorage.getItem('elm_user') || !localStorage.getItem('elm_accessToken')) {
    window.location.href = '../../auth/login.html';
    return;
  }

  const TYPE_LABELS = {
    new_construction:'بناء جديد', renovation:'تجديد', finishing:'تشطيبات',
    repair:'إصلاح', extension:'توسعة', electrical:'كهرباء',
    plumbing:'سباكة', demolition:'هدم', other:'أخرى'
  };
  const BUDGET_LABELS = {
    under_50k:'أقل من 50,000 ج.م', '50k_200k':'50,000 — 200,000',
    '200k_500k':'200,000 — 500,000', '500k_1m':'500,000 — 1 مليون', above_1m:'أكثر من 1 مليون'
  };
  const TIMELINE_LABELS = {
    within_week:'خلال أسبوع', within_month:'خلال شهر',
    '1_3_months':'1 — 3 أشهر', '3_6_months':'3 — 6 أشهر', flexible:'مرن'
  };

  let PROJECTS = [];
  const myBids = {};
  const grid = document.getElementById('projectsGrid');
  const countEl = document.getElementById('resultsCount');

  function showToast(msg, type = 'success') {
    const stack = document.getElementById('toastStack');
    if (!stack) return;
    const t = document.createElement('div');
    t.className = `pro-toast ${type}`;
    t.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;flex-shrink:0;">
      ${type === 'success' ? '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>' :
        type === 'error'   ? '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>' :
                             '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>'}
    </svg>${msg}`;
    stack.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
  }

  async function hydrateMyBids() {
    await Promise.all(PROJECTS.map(async p => {
      try {
        const b = await window.api.fetch(`/projects/${p.id}/bids`);
        if (b.myBid) myBids[p.id] = { amount: b.myBid.amount, message: b.myBid.message || '' };
      } catch (_) {}
    }));
  }

  async function loadProjects() {
    try {
      const data = await window.api.fetch('/projects');
      PROJECTS = (data.projects || []).map(p => ({
        id: p._id, type: p.projectType, title: p.title,
        governorate: p.propertyDetails?.governorate || 'غير محدد',
        area: p.propertyDetails?.area || 0,
        timeline: p.timeline, budget: p.budgetRange,
        bidsCount: p.bidsCount || 0,
        isFeatured: !!p.isFeatured, isUrgent: !!p.isUrgent,
      }));
      await hydrateMyBids();
      renderProjects();
    } catch (err) {
      grid.innerHTML = `<div style="grid-column:1/-1;" class="pro-empty">
        <span class="pro-empty-icon">⚠️</span>
        <div class="pro-empty-title">تعذّر تحميل المشاريع</div>
        <p class="pro-empty-text">تحقق من اتصالك بالإنترنت أو حاول مجدداً</p>
        <button class="btn btn-outline" onclick="loadProjects()">إعادة المحاولة</button>
      </div>`;
    }
  }

  function renderProjects() {
    const fType   = document.getElementById('f-type').value;
    const fGov    = document.getElementById('f-gov').value;
    const fBudget = document.getElementById('f-budget').value;

    const filtered = PROJECTS.filter(p => {
      if (fType   && p.type !== fType)         return false;
      if (fGov    && p.governorate !== fGov)   return false;
      if (fBudget && p.budget !== fBudget)     return false;
      return true;
    });

    if (countEl) countEl.innerHTML = `عرض <strong>${filtered.length}</strong> من أصل ${PROJECTS.length} مشروع`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1;" class="pro-empty">
        <span class="pro-empty-icon">🔍</span>
        <div class="pro-empty-title">لا توجد مشاريع مطابقة</div>
        <p class="pro-empty-text">جرب تغيير الفلاتر لعرض مشاريع أكثر</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const bid = myBids[p.id];
      return `
      <article class="pro-project-card${p.isFeatured ? ' featured' : ''}">
        <div class="ppc-tags">
          <span class="ppc-tag">${TYPE_LABELS[p.type] || '—'}</span>
          ${p.isFeatured ? `<span class="ppc-tag featured">⭐ مميز</span>` : ''}
          ${p.isUrgent   ? `<span class="ppc-tag urgent">🔥 عاجل</span>` : ''}
        </div>

        <div class="ppc-title">${p.title}</div>

        <div class="ppc-meta">
          <div class="ppc-meta-item">
            <span class="lbl">📍 المحافظة</span>
            <span class="val">${p.governorate}</span>
          </div>
          <div class="ppc-meta-item">
            <span class="lbl">📐 المساحة</span>
            <span class="val">${p.area ? p.area + ' م²' : '—'}</span>
          </div>
          <div class="ppc-meta-item">
            <span class="lbl">⏱ الجدول</span>
            <span class="val">${TIMELINE_LABELS[p.timeline] || '—'}</span>
          </div>
          <div class="ppc-meta-item">
            <span class="lbl">💰 الميزانية</span>
            <span class="val">${BUDGET_LABELS[p.budget] || '—'}</span>
          </div>
        </div>

        <div class="ppc-footer">
          <div class="ppc-bids">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <strong>${p.bidsCount}</strong> عرض مقدم
          </div>
        </div>

        ${bid ? `
        <div class="ppc-already-bid">
          ✅ قدمت عرضاً بقيمة <span class="amount">${Number(bid.amount).toLocaleString('ar-EG')} ج.م</span>
        </div>` : ''}

        <a href="project-detail.html?id=${encodeURIComponent(p.id)}" class="btn btn-primary btn-full" style="margin-top:var(--space-1);">
          عرض التفاصيل وتقديم عرض
        </a>
      </article>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
    if (user.name) {
      const first = user.name.split(' ')[0];
      const init  = first.charAt(0) || 'م';
      ['sidebarUserName','topbarUserName'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = user.name;
      });
      ['sidebarAvatar','topbarAvatar'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = init;
      });
    }

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '../../index.html';
    });

    // mobile filters
    document.getElementById('filterToggleBtn')?.addEventListener('click', () => {
      document.getElementById('filterSidebar').classList.add('open');
      document.getElementById('filterCloseBtn').style.display = 'flex';
    });
    document.getElementById('filterCloseBtn')?.addEventListener('click', () => {
      document.getElementById('filterSidebar').classList.remove('open');
    });

    // filter change events
    ['f-type','f-gov','f-budget'].forEach(id =>
      document.getElementById(id)?.addEventListener('change', renderProjects)
    );
    document.getElementById('resetFilters')?.addEventListener('click', () => {
      ['f-type','f-gov','f-budget'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      renderProjects();
      document.getElementById('filterSidebar').classList.remove('open');
    });
  });

  loadProjects();
})();
</script>
</body>
</html>
