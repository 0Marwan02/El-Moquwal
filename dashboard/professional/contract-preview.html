<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معاينة العقد | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/pro-dashboard.css">
  <style>
    .preview-layout { display: grid; grid-template-columns: 1fr 320px; gap: var(--space-6); align-items: start; }
    @media (max-width: 900px) { .preview-layout { grid-template-columns: 1fr; } }

    .preview-side {
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: var(--space-6); position: sticky; top: var(--space-4);
    }
    .status-pill {
      display: inline-block; padding: 6px 14px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: 800; margin-bottom: var(--space-4);
    }
    .preview-msg { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: var(--space-5); }
    .preview-actions { display: flex; flex-direction: column; gap: var(--space-3); }

    .contract-stepper { display: flex; gap: 4px; margin-bottom: var(--space-5); flex-wrap: wrap; }
    .c-step { flex: 1; min-width: 70px; text-align: center; }
    .c-step-dot {
      width: 28px; height: 28px; border-radius: 50%; margin: 0 auto 6px;
      background: var(--bg-surface-2); border: 2px solid var(--border-default);
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
    }
    .c-step.done .c-step-dot { background: var(--color-success-bg); border-color: var(--color-success); color: var(--color-success); }
    .c-step.current .c-step-dot { border-color: var(--color-gold); color: var(--color-gold-dark); }
    .c-step-lbl { font-size: 9px; color: var(--text-muted); font-weight: 700; }

    .contract-doc {
      background: #fff; border: 1px solid var(--border-default); border-radius: var(--radius-md);
      padding: var(--space-8); box-shadow: var(--shadow-sm);
    }
    .contract-doc-header { text-align: center; border-bottom: 2px solid var(--color-navy); padding-bottom: var(--space-5); margin-bottom: var(--space-6); }
    .contract-doc-header h3 { font-size: 20px; font-weight: 900; color: var(--color-navy); margin-bottom: 6px; }
    .contract-doc-header p { font-size: 12px; color: var(--text-muted); }
    .contract-doc-section { margin-bottom: var(--space-6); }
    .contract-doc-section h4 { font-size: 14px; font-weight: 800; color: var(--color-navy); margin-bottom: var(--space-3); padding-bottom: 6px; border-bottom: 1px dashed var(--border-default); }
    .contract-doc-list { list-style: none; margin: 0; padding: 0; }
    .contract-doc-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--bg-surface-2); font-size: 13px; }
    .contract-doc-list span { color: var(--text-muted); }
    .contract-doc-note, .contract-doc-terms { font-size: 12px; color: var(--text-secondary); line-height: 1.8; margin-top: var(--space-3); }
    .contract-sigs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    @media (max-width: 600px) { .contract-sigs-grid { grid-template-columns: 1fr; } }
    .sig-box { border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: var(--space-4); text-align: center; min-height: 120px; }
    .sig-box.signed { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.04); }
    .sig-box.pending { border-style: dashed; background: var(--bg-surface-2); }
    .sig-box-lbl { font-size: 10px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; }
    .sig-box-img { max-height: 70px; max-width: 100%; display: block; margin: 0 auto 6px; }
    .sig-box-placeholder { font-size: 13px; color: var(--text-muted); padding: 20px 0; }
    .sig-box-date { font-size: 10px; color: var(--text-muted); }
  </style>
</head>
<body class="dashboard-page">
<div class="toast-stack" id="toastStack"></div>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebarNode"></aside>
  <main class="dashboard-main">
    <div class="dashboard-topbar" id="topbarNode"></div>
    <div class="dashboard-content">
      <div style="margin-bottom:var(--space-5);">
        <a href="my-agreements.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text-muted);text-decoration:none;">← العودة لاتفاقياتي</a>
      </div>
      <div id="previewRoot"><div style="text-align:center;padding:60px;color:var(--text-muted);">جاري تحميل العقد...</div></div>
    </div>
  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/contract-shared.js"></script>
<script>
const ROLE = 'contractor';
const params = new URLSearchParams(location.search);
const projectId = params.get('projectId');

function showToast(msg, type = 'success') {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = `pro-toast ${type}`;
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function injectLayout() {
  const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
  const initial = (user.name || 'م').charAt(0);
  document.getElementById('sidebarNode').innerHTML = `
    <div class="sidebar-header"><div class="sidebar-logo-mark"><img src="../../assets/images/logo.png" alt=""></div><div class="sidebar-logo-text">المقاول</div></div>
    <div class="sidebar-user"><div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--color-gold),var(--color-gold-dark));display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--color-navy-dark);">${initial}</div>
    <div class="sidebar-user-info"><div class="name">${user.name || ''}</div><div class="role">مقاول</div></div></div>
    <nav class="sidebar-nav">
      <a href="my-agreements.html" class="sidebar-item active">اتفاقياتي</a>
      <a href="contract.html" class="sidebar-item">عقودي الرقمية</a>
    </nav>`;
  document.getElementById('topbarNode').innerHTML = `<div class="topbar-page-title">معاينة العقد</div>`;
}

async function loadPreview() {
  const root = document.getElementById('previewRoot');
  if (!projectId) {
    root.innerHTML = '<div class="state-msg">معرف المشروع مفقود.</div>';
    return;
  }
  try {
    const data = await window.api.fetch(`/contracts/project/${projectId}`);
    const contract = data.contract;
    const state = ContractShared.getSigningState(contract, ROLE);
    const token = localStorage.getItem('elm_accessToken');

    let actions = `<button class="btn btn-outline btn-full" onclick="ContractShared.downloadContractPdf('${contract._id}').catch(e=>showToast(e.message,'error'))">📄 تحميل PDF</button>`;
    if (state.canSign) {
      actions += `<button class="btn btn-primary btn-full" id="btnSign">✍️ توقيع العقد الآن</button>`;
    } else if (contract.contractorSignature?.signed) {
      actions += `<button class="btn btn-outline btn-full" disabled style="opacity:0.7;">✅ تم توقيعك</button>`;
    }

    root.innerHTML = `
      <div class="preview-layout">
        <div>${ContractShared.renderContractDocument(contract)}</div>
        <div class="preview-side">
          <span class="status-pill" style="${state.badgeStyle}">${state.badge}</span>
          ${ContractShared.renderSignStepper(contract)}
          <p class="preview-msg">${state.message}</p>
          <div class="preview-actions">${actions}</div>
          <a href="agreement-detail.html?projectId=${projectId}" class="btn btn-ghost btn-full" style="margin-top:var(--space-3);font-size:12px;">عرض لوحة الاتفاقية الكاملة</a>
        </div>
      </div>`;

    const btnSign = document.getElementById('btnSign');
    if (btnSign) {
      btnSign.onclick = () => ContractShared.openSignModal(contract._id, () => {
        showToast('تم التوقيع بنجاح!', 'success');
        setTimeout(() => loadPreview(), 800);
      });
    }
  } catch (e) {
    root.innerHTML = `<div style="text-align:center;padding:48px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px dashed var(--border-default);">
      <div style="font-size:40px;margin-bottom:12px;">📄</div>
      <h3 style="color:var(--color-navy);margin-bottom:8px;">لا يوجد عقد بعد</h3>
      <p style="color:var(--text-muted);font-size:13px;">${e.message || 'في انتظار أن ينشئ العميل العقد الإلكتروني.'}</p>
      <a href="my-agreements.html" class="btn btn-outline" style="margin-top:16px;">العودة</a>
    </div>`;
  }
}

document.addEventListener('DOMContentLoaded', () => { injectLayout(); loadPreview(); });
</script>
</body>
</html>
