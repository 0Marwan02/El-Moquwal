<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المقاول | اتفاقياتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/pro-dashboard.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">

  <style>
    .agreement-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-bottom: var(--space-5);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
    }
    .agreement-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-gold-light);
    }

    .agreement-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .agreement-title {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-navy);
      margin-bottom: 4px;
    }
    .agreement-meta {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .awarded-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--color-success);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .agreement-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-top: 1px dashed var(--border-default);
      border-bottom: 1px dashed var(--border-default);
      margin-bottom: var(--space-4);
    }
    .detail-item .lbl {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 2px;
    }
    .detail-item .val {
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-navy);
    }

    .amount-highlight {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: linear-gradient(135deg, rgba(244,166,35,0.08), rgba(244,166,35,0.03));
      border: 1px solid rgba(244,166,35,0.2);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
    }
    .amount-highlight .amount-val {
      font-size: 22px;
      font-weight: 900;
      color: var(--color-navy);
    }
    .amount-highlight .amount-lbl {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }

    .state-msg {
      text-align: center;
      padding: var(--space-16) var(--space-8);
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
    }
    .state-msg .emoji { font-size: 40px; display: block; margin-bottom: var(--space-3); }
    .state-msg h4 { color: var(--color-navy); margin-bottom: var(--space-1); font-weight: 800; }
  </style>
</head>

<body class="dashboard-page">
  <div class="dashboard-wrapper">

    <!-- Sidebar -->

      <div class="sidebar-header">
        <div class="sidebar-logo-mark">
          <img src="../../assets/images/logo.png" alt="المقاول">

      <div class="sidebar-user">

        <div class="sidebar-user-info">
          <div class="name" id="sidebarUserName">جاري التحميل...</div>
          <div class="role">مقاول</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section-label">الرئيسية</div>

        </a>
        <div class="sidebar-section-label">المشاريع</div>
        <a href="browse-projects.html" class="sidebar-item">

        <a href="my-agreements.html" class="sidebar-item active">

          اتفاقياتي

    <!-- Main -->
    <main class="dashboard-main">

            <div class="topbar-user-name" id="topbarUserName">جاري...</div>
          </div>
        </div>
      </div>

      <div class="dashboard-content">
        <div class="page-head" style="margin-bottom: var(--space-8);">
          <h2 class="section-title" style="font-size:var(--font-size-lg);font-weight:800;color:var(--color-navy);">مشاريعي المترسّية</h2>
          <p style="color:var(--text-muted); font-size:var(--font-size-sm);">المشاريع التي فاز عرضك بها وأصبحت بانتظار التنفيذ.</p>
        </div>
        <div id="pageContent">

  <div id="toastStack" style="position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/dashboard-router.js"></script>
  <script>
    function showToast(message, type = 'success') {
      const stack = document.getElementById('toastStack');
      if (!stack) return;
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.pointerEvents = 'auto';
      toast.style.minWidth = '260px';
      toast.style.maxWidth = '360px';
      toast.style.padding = '12px 14px';
      toast.style.borderRadius = '12px';
      toast.style.border = type === 'error' ? '1px solid rgba(239,68,68,0.35)' : '1px solid rgba(16,185,129,0.35)';
      toast.style.background = type === 'error' ? 'rgba(239,68,68,0.08)' : 'var(--color-success-bg)';
      toast.style.color = type === 'error' ? '#991b1b' : '#065f46';
      toast.style.boxShadow = 'var(--shadow-md)';
      toast.style.fontSize = 'var(--font-size-sm)';
      toast.style.fontWeight = '700';
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    (() => {
      const TYPE_LABELS = {
        new_construction: 'بناء جديد', renovation: 'تجديد', finishing: 'تشطيبات',
        repair: 'إصلاح', extension: 'توسعة', electrical: 'كهرباء',
        plumbing: 'سباكة', demolition: 'هدم', other: 'أخرى'
      };
      const BUDGET_LABELS = {
        under_50k: 'أقل من 50,000', '50k_200k': '50,000 - 200,000',
        '200k_500k': '200,000 - 500,000', '500k_1m': '500,000 - 1 مليون', above_1m: 'أكثر من 1 مليون'
      };

      const container = document.getElementById('pageContent');

      document.addEventListener('DOMContentLoaded', () => {
        const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
        if (user.name) {
          const initial = user.name.charAt(0) || 'م';
          document.getElementById('sidebarUserName').textContent = user.name;
          document.getElementById('topbarUserName').textContent = user.name;
          document.getElementById('sidebarAvatar').textContent = initial;
          document.getElementById('topbarAvatar').textContent = initial;
        }

        const logoutBtn = document.getElementById('logoutBtnMain');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            try { await window.api.fetch('/auth/logout', { method: 'POST' }); } catch (_) {}
            localStorage.removeItem('elm_accessToken');
            localStorage.removeItem('elm_user');
            window.location.href = '../../index.html';
          });
        }
      });

      async function load() {
        const user = JSON.parse(localStorage.getItem('elm_user') || '{}');
        if (!user._id) {
          container.innerHTML = `<div class="state-msg"><span class="emoji">🔒</span><h4>يجب تسجيل الدخول أولاً</h4><a href="../../auth/login.html" class="btn btn-primary" style="margin-top:var(--space-4);">تسجيل الدخول</a></div>`;
          return;
        }

        // Fetch awarded projects and find those where awardedTo == current contractor
        let awarded = [];
        try {
          const data = await window.api.fetch('/projects?status=awarded&limit=100');
          awarded = (data.projects || []).filter(p =>
            p.awardedTo && p.awardedTo.toString() === user._id
          );
        } catch (err) {
          container.innerHTML = `<div class="state-msg"><span class="emoji">❌</span><h4>فشل التحميل</h4><p>${err.message}</p></div>`;
          return;
        }

        // If awardedTo not populated by API, fall back to checking own bids
        if (awarded.length === 0) {
          // Check via bids: find all projects where I have an accepted bid
          // This is done by listing all open/awarded projects and checking bids
          // Simpler: just show empty state with message
          container.innerHTML = `
            <div class="state-msg">
              <span class="emoji">🏗️</span>
              <h4>لا توجد اتفاقيات حتى الآن</h4>
              <p>حين يقبل أحد العملاء عرضك ستظهر المشاريع هنا</p>
              <a href="browse-projects.html" class="btn btn-primary" style="margin-top:var(--space-4);">تصفح المشاريع وقدم عروضاً</a>
            </div>`;
          return;
        }

        const cards = await Promise.all(awarded.map(async p => {
          let bidAmount = '—', bidDuration = '—', awardedAt = '—';
          try {
            const bRes = await window.api.fetch(`/projects/${p._id}/bids`);
            const myBid = bRes.myBid;
            if (myBid) {
              bidAmount = Number(myBid.amount).toLocaleString('ar-EG') + ' جنيه';
              bidDuration = myBid.proposedDurationDays ? `${myBid.proposedDurationDays} يوم` : '—';
            }
          } catch (_) {}

          if (p.awardedAt) {
            awardedAt = new Date(p.awardedAt).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
          }

          const customerName = p.postedBy?.name || 'العميل';
          const customerInitial = customerName.charAt(0);

          let contract = null;
          let mySig = false;
          try {
            const cRes = await window.api.fetch(`/contracts/project/${p._id}`);
            contract = cRes.contract;
            if (contract && contract.contractorSignature?.signed) {
              mySig = true;
            }
          } catch (_) {}

          return `
            <div class="agreement-card">
              <div class="agreement-header">
                <div>
                  <div class="agreement-title">${p.title}</div>
                  <div class="agreement-meta">${TYPE_LABELS[p.projectType] || '—'} • ${p.propertyDetails?.governorate || '—'} • ${p.propertyDetails?.area || '—'} م² • ${p.requiredEngineers != null ? p.requiredEngineers : 1} مهندس</div>
                </div>
                <span class="awarded-badge">✅ تم الترسية لصالحك</span>
              </div>

              <div class="amount-highlight">
                <div>
                  <div class="amount-lbl">قيمة عرضك المقبول</div>
                  <div class="amount-val">${bidAmount}</div>
                </div>
              </div>

              <div class="agreement-details">
                <div class="detail-item"><span class="lbl">تاريخ الترسية</span><span class="val">${awardedAt}</span></div>
                <div class="detail-item"><span class="lbl">مدة التنفيذ</span><span class="val">${bidDuration}</span></div>
                <div class="detail-item"><span class="lbl">المساحة</span><span class="val">${p.propertyDetails?.area || '—'} م²</span></div>
                <div class="detail-item"><span class="lbl">المهندسون المطلوبون</span><span class="val">${p.requiredEngineers != null ? p.requiredEngineers : 1}</span></div>
                <div class="detail-item"><span class="lbl">الميزانية المتوقعة</span><span class="val">${BUDGET_LABELS[p.budgetRange] || '—'}</span></div>
              </div>

              <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-3);">
                <a href="agreement-detail.html?projectId=${p._id}" class="btn btn-primary" style="font-size:13px;">عرض لوحة الاتفاقية</a>
                <a href="contract-preview.html?projectId=${p._id}" class="btn btn-outline" style="font-size:13px;">📋 معاينة العقد</a>
                ${mySig 
                  ? `<button disabled class="btn btn-outline" style="font-size:13px;border-color:var(--color-success);color:var(--color-success);opacity:0.8;cursor:default;">✅ تم توقيعك</button>`
                  : `<button onclick="openSignModal('${contract ? contract._id : ''}')" class="btn btn-outline" style="font-size:13px;border-color:var(--color-gold-dark);color:var(--color-gold-dark);">✍️ توقيع العقد</button>`
                }
              </div>
            </div>`;
        }));

        container.innerHTML = cards.join('');
      }

      load();
    })();
  </script>

  <!-- E-Signature Modal -->
  <div id="signModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
    <div style="background:var(--bg-surface);border-radius:var(--radius-lg);padding:var(--space-8);max-width:520px;width:95%;box-shadow:var(--shadow-xl);position:relative;border:1px solid var(--border-default);">
      <button onclick="closeSignModal()" style="position:absolute;top:12px;left:12px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);">✕</button>
      <h3 style="font-size:var(--font-size-lg);font-weight:900;color:var(--color-navy);margin-bottom:var(--space-2);">التوقيع الإلكتروني</h3>
      <p style="font-size:var(--font-size-xs);color:var(--text-muted);margin-bottom:var(--space-6);">ارسم توقيعك بالماوس أو بإصبعك على الشاشة، أو ارفع صورة لتوقيعك.</p>

      <!-- Tab Buttons -->
      <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-4);">
        <button id="tabDraw" onclick="switchSignTab('draw')" class="btn btn-primary btn-sm" style="flex:1;">✏️ رسم التوقيع</button>
        <button id="tabUpload" onclick="switchSignTab('upload')" class="btn btn-outline btn-sm" style="flex:1;">📷 رفع صورة</button>
      </div>

      <!-- Draw Canvas -->
      <div id="drawSection">
        <canvas id="signCanvas" width="460" height="180" style="width:100%;border:2px dashed var(--border-default);border-radius:var(--radius-sm);background:#fafafa;cursor:crosshair;touch-action:none;"></canvas>
        <button onclick="clearCanvas()" style="margin-top:var(--space-2);background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:inherit;">🗑️ مسح التوقيع</button>
      </div>

      <!-- Upload Section -->
      <div id="uploadSection" style="display:none;">
        <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8);border:2px dashed var(--border-default);border-radius:var(--radius-sm);cursor:pointer;background:#fafafa;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--color-gold)'" onmouseout="this.style.borderColor='var(--border-default)'">
          <span style="font-size:36px;margin-bottom:var(--space-2);">📁</span>
          <span style="font-size:var(--font-size-sm);color:var(--text-muted);">اضغط لاختيار صورة التوقيع</span>
          <input type="file" id="signFileInput" accept="image/*" style="display:none;" onchange="previewUploadedSig(this)">
        </label>
        <img id="sigPreview" src="" alt="" style="display:none;max-width:100%;max-height:160px;margin-top:var(--space-3);border-radius:var(--radius-sm);border:1px solid var(--border-default);">
      </div>

      <button id="submitSignBtn" onclick="submitSignature()" class="btn btn-primary btn-full" style="margin-top:var(--space-5);font-size:var(--font-size-md);font-weight:800;">
        ✅ تأكيد التوقيع وإرسال
      </button>
    </div>
  </div>

  <script>
    // ── View Contract PDF ──
    async function viewContractPDF(projectId) {
      try {
        const token = localStorage.getItem('elm_accessToken');
        const base = window.api ? window.api.API_URL : 'http://localhost:4000/api';

        // Step 1: look up the contract object for this project
        const contractRes = await fetch(`${base}/contracts/project/${projectId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!contractRes.ok) {
          showToast('لا يوجد عقد لهذا المشروع بعد. سيُنشأ تلقائياً عند قبول العرض وتوقيع الطرفين.', 'error');
          return;
        }

        const contractData = await contractRes.json();
        const contractId = contractData?.contract?._id || contractData?._id;
        if (!contractId) {
          showToast('تعذّر استرجاع معرّف العقد. حاول مرة أخرى.', 'error');
          return;
        }

        // Step 2: fetch the actual PDF file using the contract _id
        const pdfRes = await fetch(`${base}/contracts/${contractId}/pdf`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (pdfRes.ok) {
          const blob = await pdfRes.blob();
          const url = URL.createObjectURL(blob);
          window.open(url, '_blank');
        } else if (pdfRes.status === 404) {
          showToast('ملف العقد PDF غير موجود بعد. تأكد من اكتمال توقيعات الطرفين.', 'error');
        } else {
          showToast('تعذّر تحميل ملف العقد. حاول مرة أخرى لاحقاً.', 'error');
        }
      } catch (err) {
        showToast('خطأ أثناء تحميل العقد: ' + err.message, 'error');
      }
    }

    // ── E-Signature Modal Logic ──
    let _signContractId = null;
    let _signMode = 'draw';
    let _isDrawing = false;
    let _ctx = null;

    function openSignModal(contractId) {
      if (!contractId) {
        showToast('في انتظار توليد العقد من قبل العميل.', 'error');
        return;
      }
      _signContractId = contractId;
      const modal = document.getElementById('signModal');
      modal.style.display = 'flex';
      switchSignTab('draw');
      initCanvas();
    }

    function closeSignModal() {
      document.getElementById('signModal').style.display = 'none';
      _signContractId = null;
    }

    function switchSignTab(mode) {
      _signMode = mode;
      document.getElementById('drawSection').style.display = mode === 'draw' ? 'block' : 'none';
      document.getElementById('uploadSection').style.display = mode === 'upload' ? 'block' : 'none';
      document.getElementById('tabDraw').className = mode === 'draw' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
      document.getElementById('tabUpload').className = mode === 'upload' ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
      if (mode === 'draw') initCanvas();
    }

    function initCanvas() {
      const canvas = document.getElementById('signCanvas');
      if (!canvas) return;
      _ctx = canvas.getContext('2d');
      _ctx.lineWidth = 2.5;
      _ctx.lineCap = 'round';
      _ctx.strokeStyle = '#0F172A';

      // Mouse events
      canvas.onmousedown = (e) => { _isDrawing = true; _ctx.beginPath(); _ctx.moveTo(e.offsetX, e.offsetY); };
      canvas.onmousemove = (e) => { if (!_isDrawing) return; _ctx.lineTo(e.offsetX, e.offsetY); _ctx.stroke(); };
      canvas.onmouseup = () => { _isDrawing = false; };
      canvas.onmouseleave = () => { _isDrawing = false; };

      // Touch events
      canvas.ontouchstart = (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        _isDrawing = true; _ctx.beginPath(); _ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top);
      };
      canvas.ontouchmove = (e) => {
        e.preventDefault();
        if (!_isDrawing) return;
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        _ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top); _ctx.stroke();
      };
      canvas.ontouchend = () => { _isDrawing = false; };
    }

    function clearCanvas() {
      const canvas = document.getElementById('signCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function previewUploadedSig(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.getElementById('sigPreview');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function submitSignature() {
      if (!_signContractId) return;
      let signatureData = '';

      if (_signMode === 'draw') {
        const canvas = document.getElementById('signCanvas');
        const blank = document.createElement('canvas');
        blank.width = canvas.width; blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) {
          showToast('يرجى رسم توقيعك أولاً', 'error');
          return;
        }
        signatureData = canvas.toDataURL('image/png');
      } else {
        const img = document.getElementById('sigPreview');
        if (!img.src || img.style.display === 'none') {
          showToast('يرجى رفع صورة التوقيع أولاً', 'error');
          return;
        }
        signatureData = img.src;
      }

      const btn = document.getElementById('submitSignBtn');
      btn.disabled = true;
      btn.textContent = '⏳ جاري الإرسال...';

      try {
        const token = localStorage.getItem('elm_accessToken');
        const base = window.api ? window.api.API_URL : 'http://localhost:4000/api';
        const res = await fetch(`${base}/contracts/${_signContractId}/sign`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ signatureData })
        });

        if (res.ok) {
          showToast('تم تسجيل توقيعك بنجاح! ✅', 'success');
          closeSignModal();
          setTimeout(() => window.location.reload(), 1500);
        } else {
          const data = await res.json().catch(() => ({}));
          showToast(data.message || 'تعذّر تسجيل التوقيع. حاول مرة أخرى.', 'error');
        }
      } catch (err) {
        showToast('خطأ في الاتصال: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✅ تأكيد التوقيع وإرسال';
      }
    }
  </script>
</body>
