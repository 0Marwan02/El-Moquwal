<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الشروط والأحكام | المقاول</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <style>
    body { background: var(--bg-app); padding-top: var(--navbar-height); }

    .terms-hero {
      background: linear-gradient(135deg, var(--color-navy-dark), var(--color-navy));
      color: #fff;
      padding: var(--space-12) 0 var(--space-10);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .terms-hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.6;
      pointer-events: none;
    }
    .terms-hero h1 {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: var(--space-3);
      position: relative;
    }
    .terms-hero p {
      font-size: var(--font-size-md);
      color: rgba(255,255,255,0.7);
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    .terms-wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: var(--space-10) var(--content-padding);
    }
    .terms-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: var(--space-10);
    }
    .terms-updated {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      margin-bottom: var(--space-6);
      font-weight: 700;
    }
    .terms-body {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-size: var(--font-size-md);
      line-height: 2;
      color: var(--text-primary);
    }
    .terms-empty {
      text-align: center;
      padding: var(--space-12) var(--space-6);
      color: var(--text-muted);
    }
    .terms-empty .emoji { font-size: 48px; margin-bottom: var(--space-4); }
    .terms-empty h3 { color: var(--color-navy); font-weight: 800; margin-bottom: var(--space-2); }

    @media (max-width: 640px) {
      .terms-card { padding: var(--space-6); }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       NAVBAR
       ============================================================ -->
  <nav class="navbar" role="navigation" aria-label="القائمة الرئيسية">
    <div class="navbar-logo">
      <div class="logo-mark">
        <img src="assets/images/logo.png" alt="المقاول">
      </div>
      <span class="logo-text">المقاول</span>
    </div>

    <ul class="navbar-nav">
      <li><a href="index.html#how">كيف يعمل؟</a></li>
      <li><a href="index.html#features">المميزات</a></li>
      <li><a href="index.html#pros">المحترفون</a></li>
      <li><a href="index.html#faq">الأسئلة</a></li>
    </ul>

    <div class="navbar-actions">
      <a href="auth/login.html" class="navbar-login">سجل دخول</a>
      <a href="auth/role-select.html" class="btn btn-primary btn-sm">ابدأ مجاناً</a>
    </div>
  </nav>


  <!-- ============================================================
       HERO
       ============================================================ -->
  <section class="terms-hero">
    <div class="container">
      <h1>الشروط والأحكام</h1>
      <p>يرجى قراءة الشروط والأحكام بعناية قبل استخدام منصة المقاول.</p>
    </div>
  </section>


  <!-- ============================================================
       CONTENT
       ============================================================ -->
  <main class="terms-wrap">
    <div class="terms-card" id="termsCard">
      <p style="color:var(--text-muted); text-align:center;">جاري التحميل...</p>
    </div>
  </main>


  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom-bar" style="padding-top: var(--space-12); padding-bottom: var(--space-5); border-top:1px solid rgba(255,255,255,0.07);">
        <div class="footer-copy">© ٢٠٢٥ منصة المقاول. جميع الحقوق محفوظة.</div>
        <div class="footer-legal-links">
          <a href="index.html#">سياسة الخصوصية</a>
          <a href="terms.html">الشروط والأحكام</a>
          <a href="index.html#">الدعم الفني</a>
        </div>
      </div>
    </div>
  </footer>


  <script>
    (async function loadTerms() {
      const card = document.getElementById('termsCard');
      const API_URL = 'http://localhost:4000/api';
      try {
        const res = await fetch(`${API_URL}/admin/terms`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'فشل التحميل');

        const terms = (data.terms || '').trim();
        if (!terms) {
          card.innerHTML = `
            <div class="terms-empty">
              <div class="emoji">📜</div>
              <h3>الشروط والأحكام لم يتم نشرها بعد</h3>
              <p>سيتم نشر الشروط والأحكام قريباً. الرجاء المراجعة لاحقاً.</p>
            </div>`;
          return;
        }

        const lastUpdatedHtml = data.lastUpdated
          ? `<div class="terms-updated">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8v4l3 3 1-1-3-2.7V8h-1zm0-6a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16z"/></svg>
               آخر تحديث: ${new Date(data.lastUpdated).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' })}
             </div>`
          : '';

        // Escape HTML, then preserve newlines via .terms-body white-space:pre-wrap
        const escaped = terms
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        card.innerHTML = `${lastUpdatedHtml}<div class="terms-body">${escaped}</div>`;
      } catch (err) {
        card.innerHTML = `
          <div class="terms-empty">
            <div class="emoji">⚠️</div>
            <h3>تعذر تحميل الشروط والأحكام</h3>
            <p>حدث خطأ أثناء الاتصال بالخادم — حاول مرة أخرى لاحقاً.</p>
          </div>`;
      }
    })();
  </script>
</body>
</html>
